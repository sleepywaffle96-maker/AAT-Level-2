<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Interactive Simulator Matrix</title>
    <style>
        :root { --bg-dark: #0B0F19; --card-white: #FFFFFF; --primary-teal: #117A71; --primary-hover: #0E635C; --text-dark: #1F2937; --text-muted: #64748B; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: var(--text-dark); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .dashboard-container { width: 100%; max-width: 600px; background: var(--card-white); padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .back-link { display: inline-block; color: #0284C7; text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 24px; }
        h1 { font-size: 32px; font-weight: 800; text-align: center; color: #0F172A; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 32px; line-height: 1.5; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; }
        select { width: 100%; padding: 14px 16px; font-size: 15px; border: 1px solid #CBD5E1; border-radius: 8px; background-color: #F8FAFC; color: #0F172A; cursor: pointer; }
        .launch-btn { width: 100%; background-color: var(--primary-teal); color: white; border: none; padding: 16px; font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 32px; }
        .launch-btn:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <a href="javascript:history.back();" class="back-link">← Back to Dashboard</a>
        <h1>AAT Interactive Simulator</h1>
        <p class="subtitle">Configure your criteria parameters below to generate a paginated 15-task mock assessment window.</p>
        <div class="form-group">
            <label>Target Assessment Level</label>
            <select id="level-select" onchange="updateChapters()">
                <option value="" selected disabled>Select Qualification Level...</option>
                <option value="RANDOM">🎲 Randomize All Levels - Mixed Scenario</option>
                <option value="L2">📊 AAT Level 2 Certificate</option>
                <option value="L3">🔷 AAT Level 3 Diploma</option>
                <option value="L4">🔶 AAT Level 4 Diploma</option>
            </select>
        </div>
        <div class="form-group">
            <label>Syllabus Chapter Unit</label>
            <select id="chapter-select" disabled>
                <option value="" selected disabled>Select a level first...</option>
            </select>
        </div>
        <button class="launch-btn" onclick="launchPaginatedTestWindow()">Launch Paginated Test Window →</button>
    </div>
<script>
 const syllabusData = {
 "L2": ["Chapter 1: Bookkeeping Transactions","Chapter 2: Bookkeeping Controls","Chapter 3: Principles of Costing","Chapter 4: Work Effectively in Finance","Chapter 5: The Trial Balance Matrix & DEAD CLIC"],
 "L3": ["Chapter 1: Advanced Bookkeeping","Chapter 2: Final Accounts Preparation","Chapter 3: Management Accounting: Costing","Chapter 4: Indirect Tax","Chapter 5: Ethics for Accountants","Chapter 6: Business Awareness"],
 "L4": ["Chapter 1: Financial Statements of Limited Companies","Chapter 2: Management Accounting: Budgeting","Chapter 3: Management Accounting: Decision and Control","Chapter 4: External Auditing","Chapter 5: Cash and Treasury Management","Chapter 6: Credit Management","Chapter 7: Personal Tax","Chapter 8: Business Tax","Chapter 9: Internal Accounting Systems and Controls"]
 };
 function updateChapters() {
 const lvl = document.getElementById("level-select"); const chap = document.getElementById("chapter-select");
 if (!lvl || !chap) return;
 chap.removeAttribute("disabled"); chap.disabled = false; chap.innerHTML = "";
 if (lvl.value === "RANDOM") {
     let o = document.createElement("option"); o.value = "ALL_RANDOM"; o.textContent = "🎲 Randomize Across All Syllabus Chapters"; chap.appendChild(o); return;
 }
 let oRand = document.createElement("option"); oRand.value = "LEVEL_RANDOM"; oRand.textContent = "🎲 Randomize Chapter Inside This Level"; chap.appendChild(oRand);
 if (syllabusData[lvl.value]) {
     syllabusData[lvl.value].forEach((name, i) => {
         let o = document.createElement("option"); o.value = "cap" + (i + 1); o.textContent = name; chap.appendChild(o);
     });
 }
 }
 function launchPaginatedTestWindow() {
 const lvl = document.getElementById("level-select").value;
 const chap = document.getElementById("chapter-select").value;
 if (!lvl || !chap) { alert("Please select both parameters before launching."); return; }
 localStorage.setItem("aat_sel_level", lvl);
 window.open("test-popup.html", "_blank");
 }
</script>
</body>
</html>
