<script>
 const syllabusData = {
 "L2": [
 "Chapter 1: Bookkeeping Transactions",
 "Chapter 2: Bookkeeping Controls",
 "Chapter 3: Principles of Costing",
 "Chapter 4: Work Effectively in Finance",
 "Chapter 5: Trial Balance Matrix & DEAD CLIC" // <--- INSERITO IL TUO NUOVO CAPITOLO 5
 ],
 "L3": [
 "Chapter 1: Advanced Bookkeeping",
 "Chapter 2: Final Accounts Preparation",
 "Chapter 3: Management Accounting: Costing",
 "Chapter 4: Indirect Tax",
 "Chapter 5: Ethics for Accountants",
 "Chapter 6: Business Awareness"
 ],
 "L4": [
 "Chapter 1: Financial Statements of Limited Companies",
 "Chapter 2: Management Accounting: Budgeting",
 "Chapter 3: Management Accounting: Decision and Control",
 "Chapter 4: External Auditing",
 "Chapter 5: Cash and Treasury Management",
 "Chapter 6: Credit Management",
 "Chapter 7: Personal Tax",
 "Chapter 8: Business Tax",
 "Chapter 9: Internal Accounting Systems and Controls"
 ]
 };

 function updateChapters() {
 const lvlSelector = document.getElementById("level-selector");
 const chapSelector = document.getElementById("chapter-selector");
 if (!lvlSelector || !chapSelector) return;
 
 const selectedLevel = lvlSelector.value;
 chapSelector.removeAttribute("disabled");
 chapSelector.disabled = false;
 chapSelector.innerHTML = "";
 
 if (selectedLevel === "RANDOM") {
 let opt = document.createElement("option");
 opt.value = "ALL_RANDOM";
 opt.textContent = " Randomize Across All Syllabus Chapters";
 chapSelector.appendChild(opt);
 return;
 }
 let optRand = document.createElement("option");
 optRand.value = "LEVEL_RANDOM";
 optRand.textContent = " Randomize Chapter Inside This Level";
 chapSelector.appendChild(optRand);
 if (syllabusData[selectedLevel]) {
 syllabusData[selectedLevel].forEach((chapName, index) => {
 let opt = document.createElement("option");
 opt.value = "cap" + (index + 1);
 opt.textContent = chapName;
 chapSelector.appendChild(opt);
 });
 }
 }

 const testWindow = window.open("", "_blank");
 testWindow.document.write(`
 <!DOCTYPE html>

 .osborne-footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; width: 100%; max-width: 720px; margin-top: 20px; }
 .osborne-btn { border: 1px solid #CBD5E1; border-radius: 6px; padding: 12px 4px; font-size: 11.5px; font-weight: 700; cursor: pointer; text-align: center; background: #F8FAFC; color: #334155; outline: none; }
 .osborne-btn:hover { background: #F1F5F9; }
 .btn-verify { background: #1E293B; color: #FFFFFF; border-color: #1E293B; }
 .btn-verify:hover { background: #0F172A; }
 .btn-solution { background: #0284C7; color: #FFFFFF; border-color: #0284C7; }
 .btn-solution:hover { background: #0369A1; }
 .calc-widget-floating { position: fixed; bottom: 20px; right: 20px; width: 280px; z-index: 9999; background: rgba(16, 24, 48, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(0, 242, 254, 0.25); border-radius: 10px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6); overflow: hidden; }

 <body>
 <div style="width: 100%; max-width: 720px; display: flex; flex-direction: column; align-items: center;">
 <div id="questions-root-wrapper" style="width: 100%;"></div>
 </div>
 <div class="osborne-footer-grid">
 <button onclick="verifyCurrentInline()" class="osborne-btn btn-verify">Am I right?</button>
 <button onclick="showCurrentSolution()" class="osborne-btn btn-solution">Show Solution</button>
 <button onclick="resetCurrentForm()" class="osborne-btn">Reset</button>
 <button onclick="changeQuestion(-1)" class="osborne-btn">&larr;&larr;&larr; previous question</button>
 <button onclick="changeQuestion(1)" class="osborne-btn">next question &rarr;&rarr;&rarr;</button>
 <button id="osborne-pdf-trigger" onclick="triggerAutoPDFDownload()" class="osborne-btn" style="display: none; background: #00796B; color: white; border-color: #00796B; box-shadow: 0 4px 12px rgba(0,121,107,0.15);"> Download as PDF</button>
 </div>
 <div id="floatingCalcWidget" class="calc-widget-floating">
 <div class="calc-widget-header" onclick="toggleCalculatorView()">
 <span> AAT Exam Calculator</span>
 <span id="calcToggleArrow">▲</span>
 </div>
 <div id="calcWidgetBody" class="calc-widget-body">
 <input type="text" id="calcDisplayScreen" class="calc-display" readonly value="0">

 <script>
 const scenarios = [
 { text: "Verify the balancing steps for the Sales Ledger Control Account discrepancy.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Analyze the statutory ammortisation index applied to non-current asset categories.", correct: "B", diff: " Difficulty: Intermediate" },
 { text: "Reconcile the opening cash book deficit against bank statement credit entries.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Compute the standard overhead absorption rate based on direct labour allocation.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Determine the correct input VAT adjustment for trade receivables.", correct: "B", diff: " Difficulty: Intermediate" },
 { text: "Evaluate closing inventory variance under FIFO valuation constraints.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Reconstruct incomplete sole trader turnover parameters using margin criteria.", correct: "B", diff: " Difficulty: 🔴 Professional Level" },
 { text: "Formulate the proper accounting treatment for capitalised development outlays.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Process year-end accruals for statutory utility liabilities.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Identify the systemic risk indicators within the purchase ledger sub-module.", correct: "B", diff: " Difficulty: Intermediate" },
 { text: "Adjust the Suspense Account allocation following a transposition error.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Calculate the Partnership profit share ratio adjustments under current laws.", correct: "B", diff: " Difficulty: 🔴 Professional Level" },
 { text: "Assess Corporate Governance breaches under the IESBA framework.", correct: "A", diff: "🟢 Difficulty: Entry Level" },
 { text: "Verify the Consolidated Statement adjustments for internal unrealised profits.", correct: "A", diff: " Difficulty: Intermediate" },
 { text: "Compute the standard variance indicators for production yields.", correct: "B", diff: " Difficulty: Professional Level" },
 { text: "Under the DEAD CLIC framework, which nominal accounts have balances placed in the Credit column of a Trial Balance?", correct: "A", diff: " Difficulty: 🔴 Professional Level" },
 { text: "A Trial Balance has a Debit total of £24,650 and a Credit total of £24,200. Calculate the temporary Suspense Account opening balance (£).", correct: "B", diff: " Difficulty: Intermediate" },
 { text: "If an office stationery invoice for £150 is debited to the Machinery Asset account, what category of error is formed?", correct: "C", diff: "🟢 Difficulty: Entry Level" },
 { text: "A business carries a bank overdraft at month-end. In which Trial Balance column must this balance b/d be extracted?", correct: "B", diff: " Difficulty: Intermediate" }
 ];
 const optionTexts = [
 { a: "Adjust Sales Ledger Control Account parameters through prime journals", b: "Account for the discrepancy directly through Suspense Control procedures", c: "Issue a formal credit note to match outstanding balances" },
 { a: "Apply straight-line depreciation index to non-current structures", b: "Execute statutory reducing balance adjustments to current categories", c: "Reclassify non-current outlays into operational expenses" },
 { a: "Reconcile the opening cash book deficit against credit bank entries", b: "Transfer unpresented cheques directly to the Suspense Control account", c: "Perform a retrospective bank statement write-off analysis" },
 { a: "Compute standard absorption parameters based on direct labour allocation", b: "Allocate general factory overheads using floor area square coefficients", c: "Absorb marginal expenses into production yield margins" },
 { a: "Process bad debts write-offs under HMRC irrecoverable rules", b: "Determine the correct input VAT clawback for trade receivables", c: "Adjust the provision for doubtful debts using age analysis parameters" },
 { a: "Evaluate closing inventory values under strict FIFO constraints", b: "Apply AVCO index adjustments to periodic stock valuations", c: "Execute an immediate net realisable value cost write-down" },
 { a: "Apply the standard gross profit margin percentage to purchases data", b: "Reconstruct incomplete sole trader turnover using mark-up criteria", c: "Formulate bank summary cash drawings balancing steps" },
 { a: "Capitalise intangible outlays under strict IAS 38 recognition criteria", b: "Write off structural prototype expenses as immediate overhead costs", c: "Amortise research coefficients over a fixed operational cycle" },
 { a: "Debit relevant utility expenditure and credit the Accruals account", b: "Credit outstanding rental provisions and debit Prepayments balances", c: "Post year-end corrections directly through the Trial Balance ledger" },
 { a: "Segregate commercial processing duties within the purchase ledger", b: "Implement systemic risk reviews within the automated payment loop", c: "Perform an exhaustive manual audit of supplier invoice matching rules" },
 { a: "Debit Suspense Account and credit Sales ledger following a transposition error", b: "Adjust opening Trial Balance differences via direct general journal entries", c: "Reverse incorrect double-entry parameters across control files" },
 { a: "Apportion residual profits using agreed partnership salary clauses", b: "Calculate profit share ratio adjustments under current legal bases", c: "Charge nominal interest on partner capital drawings variables" },
 { a: "Report ethical breaches under the official IESBA public interest framework", b: "Incorporate strict internal corporate governance compliance committees", c: "Execute disclosure notes additions to safeguard audit independence" },
 { a: "Eliminate internal unrealised profits from closing consolidated stocks", b: "Adjust minority interest coefficients within the Group statement", c: "Consolidate subsidiary ledger provisions using pro-rata rules" },
 { a: "Compute standard yield variances across active material parameters", b: "Isolate total material price variances from operational usage data", c: "Revise budgeted output targets following unexpected machine failures" },
 { a: "Liabilities, Income (Sales), and Capital Base", b: "Expenses, Assets, and Drawings accounts", c: "Only Depreciation Provisions and Active Trade Payables Control" },
 { a: "£450 Credit balance opening inside general ledger", b: "£450 Debit balance opening inside general ledger", c: "No Suspense entry is compiled because errors compensate" },
 { a: "Error of Omission", b: "Error of Commission", c: "Error of Principle" },
 { a: "The Debit column, because cash always acts as an active resource", b: "The Credit column, because a bank overdraft represents an active Current Liability", c: "Suspense Account allocation workspace" }
 ];
 let currentActiveIndex = 0;
 const root = document.getElementById("questions-root-wrapper");
 
 let selectedQuestions = [];
 if (lvl === "RANDOM" || chap === "ALL_RANDOM") {
     selectedQuestions = scenarios.sort(() => 0.5 - Math.random()).slice(0, 15);
 } else if (chap === "LEVEL_RANDOM") {
     let levelFilter = scenarios.filter(q => q.diff.includes(lvl) || (lvl === "L2" && scenarios.indexOf(q) >= 15));
     selectedQuestions = levelFilter.sort(() => 0.5 - Math.random()).slice(0, 15);
 } else {
     let chapIndex = parseInt(chap.replace("cap", ""), 10);
     if (lvl === "L2" && chapIndex === 5) {
         selectedQuestions = scenarios.slice(15, 19);
     } else if (lvl === "L2") {
         selectedQuestions = scenarios.slice(0, 15).sort(() => 0.5 - Math.random()).slice(0, 15);
     } else {
         selectedQuestions = scenarios.sort(() => 0.5 - Math.random()).slice(0, 15);
     }
 }

 selectedQuestions.forEach((q, idx) => {
 const num = idx + 1;
 const masterIdx = scenarios.findIndex(s => s.text === q.text);
 const opts = optionTexts[masterIdx !== -1 ? masterIdx : idx % optionTexts.length];
 root.innerHTML += `
 <div class="test-card-container ${idx === 0 ? 'active' : ''}" id="card_task_${idx}" data-correct="${q.correct}">
 <div class="header-area">
 <span class="level-tag">${badgeText} • Q${num} of ${selectedQuestions.length}</span>
 <span class="difficulty-tag">${q.diff}</span>
 </div>
 <div class="question-title">Assessment Task ${num}</div>
 <p style="font-size: 14.5px; color: #1E293B; margin-bottom: 20px; line-height: 1.5; font-weight: 500;">
 ${q.text}
 </p>
 <div class="option-row" onclick="document.getElementById('opt_${idx}_A').checked = true">
 <span class="option-text-left">${opts.a}</span>
 <div class="option-right-inputs">
 <div class="feedback-marker" id="mark_${idx}_A"></div>
 <input type="radio" name="ans_${idx}" id="opt_${idx}_A" value="A" style="cursor:pointer;">
 </div>
 </div>
 <div class="option-row" onclick="document.getElementById('opt_${idx}_B').checked = true">
 <span class="option-text-left">${opts.b}</span>
 <div class="option-right-inputs">
 <div class="feedback-marker" id="mark_${idx}_B"></div>
 <input type="radio" name="ans_${idx}" id="opt_${idx}_B" value="B" style="cursor:pointer;">
 </div>
 </div>
 <div class="option-row" onclick="document.getElementById('opt_${idx}_C').checked = true">
 <span class="option-text-left">${opts.c}</span>
 <div class="option-right-inputs">
 <div class="feedback-marker" id="mark_${idx}_C"></div>
 <input type="radio" name="ans_${idx}" id="opt_${idx}_C" value="C" style="cursor:pointer;">
 </div>
 </div>
 </div>
 `;
 });
 function changeQuestion(step) {
 const target = currentActiveIndex + step;
 if (target >= 0 && target < selectedQuestions.length) {
 document.getElementById("card_task_" + currentActiveIndex).classList.remove("active");
 currentActiveIndex = target;
 document.getElementById("card_task_" + currentActiveIndex).classList.add("active");
 }
 const pdfBtn = document.getElementById("osborne-pdf-trigger");
 if (pdfBtn) pdfBtn.style.display = (currentActiveIndex === selectedQuestions.length - 1) ? "block" : "none";
 }
 function triggerAutoPDFDownload() {
 const originalTitle = document.title;
 document.title = "AAT_Official_Exam_Worksheet";
 window.print();
 setTimeout(() => { document.title = originalTitle; }, 500);
 }
 function showCurrentSolution() {
 const activeCard = document.getElementById("card_task_" + currentActiveIndex);
