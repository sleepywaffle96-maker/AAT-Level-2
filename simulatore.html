function updateChapters(){

    const levelSelect =
        document.getElementById("level-select");

    const chapterSelect =
        document.getElementById("chapter-select");

    const selectedLevel =
        levelSelect.value;

    chapterSelect.innerHTML = "";

    if(!selectedLevel){

        chapterSelect.innerHTML =
        '<option value="">Select a level first...</option>';

        chapterSelect.disabled = true;
        return;
    }

    chapterSelect.disabled = false;

    const chapters =
        syllabusData[selectedLevel] || [];

    const defaultOption =
        document.createElement("option");

    defaultOption.value = "";
    defaultOption.textContent =
        "Select a chapter...";

    chapterSelect.appendChild(defaultOption);

    chapters.forEach(ch => {

        const option =
            document.createElement("option");

        option.value = ch.value;
        option.textContent = ch.label;

        chapterSelect.appendChild(option);
    });
}

function rand(min,max){

    return Math.floor(
        Math.random()*(max-min+1)
    ) + min;
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j =
        Math.floor(Math.random()*(i+1));

        [array[i],array[j]] =
        [array[j],array[i]];
    }

    return array;
}

function currency(v){

    return "£" +
    Number(v).toFixed(2);
}

/* ------------------------
   LEVEL 2 QUESTION BANK
------------------------ */

function generateL2CH1(){

    const amount = rand(120,950);

    const correct =
        amount;

    const options =
        shuffle([
            correct,
            correct + 50,
            correct - 40,
            correct + 90
        ]);

    return {

        question:
        `A cash sale of ${currency(amount)}
         was completed today.
         What value should be recorded
         in the sales account?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(correct)
    };
}

function generateL2CH2(){

    const amount = rand(150,1200);

    const correct =
        "Debit Purchases";

    const options =
        shuffle([
            correct,
            "Credit Purchases",
            "Debit Sales",
            "Credit Cash"
        ]);

    return {

        question:
        `Inventory costing ${currency(amount)}
         was purchased on credit.
         Which entry follows
         double-entry principles?`,

        options,
        correct:
        options.indexOf(correct)
    };
}
    function generateL2CH3(){

    const debit = rand(800,3000);
    const credit = rand(200,700);

    const balance = debit - credit;

    const options =
        shuffle([
            balance,
            balance + 100,
            balance - 100,
            balance + 250
        ]);

    return {

        question:
        `A ledger account shows total debits
         of ${currency(debit)} and total credits
         of ${currency(credit)}.

         What is the closing balance?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(balance)
    };
}

function generateL2CH4(){

    const customer = rand(1200,5000);
    const control = customer;

    const options =
        shuffle([
            control,
            control + 300,
            control - 250,
            control + 150
        ]);

    return {

        question:
        `The sum of all customer balances
         equals ${currency(customer)}.

         What should the receivables
         control account equal?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(control)
    };
}

function generateL2CH5(){

    const options =
        shuffle([
            "Expenses increase with Debits",
            "Expenses increase with Credits",
            "Assets increase with Credits",
            "Drawings increase with Credits"
        ]);

    return {

        question:
        `According to the DEAD CLIC matrix,
         which statement is correct?`,

        options,

        correct:
        options.indexOf(
            "Expenses increase with Debits"
        )
    };
}

/* ------------------------
   LEVEL 3 QUESTION BANK
------------------------ */

function generateL3CH1(){

    const purchase = rand(1000,6000);
    const depreciation = Math.round(
        purchase * 0.10
    );

    const options =
        shuffle([
            depreciation,
            depreciation + 100,
            depreciation - 50,
            depreciation + 250
        ]);

    return {

        question:
        `An asset costing
         ${currency(purchase)}
         is depreciated at 10%.

         What is the annual charge?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(depreciation)
    };
}

function generateL3CH2(){

    const revenue = rand(10000,40000);
    const expenses = rand(3000,9000);

    const profit =
        revenue - expenses;

    const options =
        shuffle([
            profit,
            profit + 500,
            profit - 500,
            profit + 1000
        ]);

    return {

        question:
        `Revenue equals
         ${currency(revenue)}
         and expenses equal
         ${currency(expenses)}.

         What is the profit?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(profit)
    };
}
    function generateL3CH3(){

    const net = rand(500,8000);

    const vat =
        Number((net * 0.20).toFixed(2));

    const options =
        shuffle([
            vat,
            vat + 20,
            vat - 20,
            vat + 40
        ]);

    return {

        question:
        `Calculate VAT at 20%
         on a taxable value of
         ${currency(net)}.`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(vat)
    };
}

function generateL3CH4(){

    const gross = rand(1800,3500);

    const tax =
        Math.round(gross * 0.20);

    const options =
        shuffle([
            tax,
            tax + 50,
            tax - 50,
            tax + 100
        ]);

    return {

        question:
        `An employee earns
         ${currency(gross)} gross pay.

         Assuming deductions at 20%,
         how much tax is withheld?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(tax)
    };
}

function generateL3CH5(){

    const debit = rand(5000,12000);
    const credit = debit - rand(100,900);

    const difference =
        debit - credit;

    const options =
        shuffle([
            difference,
            difference + 100,
            difference - 100,
            difference + 200
        ]);

    return {

         and credits of
         ${currency(credit)}.

         What is the balancing difference?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(difference)
    };
}

/* ------------------------
   LEVEL 4 QUESTION BANK
------------------------ */

function generateL4CH1(){

    const profit = rand(5000,25000);
    const revenue = rand(40000,90000);

    const margin =
        Number(
            ((profit/revenue)*100)
            .toFixed(1)
        );

    const options =
        shuffle([
            margin,
            margin + 2,
            margin - 2,
            margin + 4
        ]);

    return {

        question:
        `Profit equals
         ${currency(profit)}
         and revenue equals
         ${currency(revenue)}.

         Calculate the profit margin %.`,

        options:
        options.map(v=>v + "%"),

        correct:
        options.indexOf(margin)
    };
}

function generateL4CH2(){

    const budget = rand(15000,50000);
    const actual = budget + rand(-3000,3000);

    const variance =
        actual - budget;

    const options =
        shuffle([
            variance,
            variance + 500,
            variance - 500,
            variance + 1000
        ]);

    return {

        question:
        `Budgeted spending was
         ${currency(budget)}
         while actual spending was
         ${currency(actual)}.

         What is the variance?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(variance)
    };
}
    function generateL4CH3(){

    const controls = [

        "Monthly bank reconciliation",

    ];

    const correct =

    const options =
        shuffle([
            correct,
            "Personal use of company funds",
            "No approval process",
            "Shared passwords"
        ]);

    return {

        question:
        `Which of the following is
         considered a strong
         internal control?`,

        options,

        correct:
        options.indexOf(correct)
    };
}

function generateL4CH4(){

    const units =
        rand(1000,5000);

    const fixed =
        rand(3000,12000);

    const variable =
        rand(2,8);

    const total =
        fixed + (units * variable);

    const options =
        shuffle([
            total,
            total + 1000,
            total - 1000,
            total + 2000
        ]);

    return {

        question:
        `Fixed costs are
         ${currency(fixed)}.

         Variable cost per unit is
         ${currency(variable)}.

         Production volume is
         ${units} units.

         What is total cost?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(total)
    };
}

function generateL4CH5(){

    const inflow =
        rand(10000,50000);

    const outflow =
        rand(5000,25000);

    const net =
        inflow - outflow;

    const options =
        shuffle([
            net,
            net + 1000,
            net - 1000,
            net + 2000
        ]);

    return {

        question:
        `Cash inflows total
         ${currency(inflow)}
         and cash outflows total
         ${currency(outflow)}.

         What is the net cash flow?`,

        options:
        options.map(v=>currency(v)),

        correct:
        options.indexOf(net)
    };
}

   QUESTION GENERATOR

function buildQuestionPool(){

    return {

        "L2-CH1":generateL2CH1,
        "L2-CH2":generateL2CH2,
        "L2-CH3":generateL2CH3,
        "L2-CH4":generateL2CH4,
        "L2-CH5":generateL2CH5,

        "L3-CH1":generateL3CH1,
        "L3-CH2":generateL3CH2,
        "L3-CH3":generateL3CH3,
        "L3-CH4":generateL3CH4,
        "L3-CH5":generateL3CH5,

        "L4-CH1":generateL4CH1,
        "L4-CH2":generateL4CH2,
        "L4-CH3":generateL4CH3,
        "L4-CH4":generateL4CH4,
        "L4-CH5":generateL4CH5
    };
}

function createExamQuestions(){

    const level =
        document.getElementById(
            "level-select"
        ).value;

    const chapter =
        document.getElementById(
            "chapter-select"
        ).value;

    const pool =
        buildQuestionPool();

    let generators = [];

    if(level === "random"){

        generators =
        Object.values(pool);
    }
        else if(
        chapter &&
        !chapter.includes("random")
    ){

        generators = [
            pool[chapter]
        ];
    }

    else{

        generators =
        Object.entries(pool)
        .filter(([key]) =>
            key.startsWith(level)
        )
        .map(([,fn]) => fn);
    }

    const questions = [];

    for(let i=0;i<15;i++){

        const generator =
            generators[
                rand(
                    0,
                    generators.length-1
                )
            ];

        questions.push(generator());
    }

    return questions;
}

    chosen === correct

    ? "#16A34A"

    : "#DC2626";
}

function showSolution(){

    const correct =

    questions[currentQuestion]
    .correct;

    const rows =

    document.querySelectorAll(
        ".option-row"
    );

    rows[correct]
    .classList.add(
        "reveal-correct"
    );
}

function resetQuestion(){

    document

    .querySelectorAll(
        'input[name="answer"]'
    )

    .forEach(el=>{

        el.checked = false;
    });

    document

    .querySelectorAll(
        ".feedback-marker"
    )

    .forEach(el=>{

        el.textContent = "";
    });

    document

    .querySelectorAll(
        ".option-row"
    )

    .forEach(el=>{

        el.classList.remove(
            "reveal-correct"
        );
    });
}

function previousQuestion(){

    if(currentQuestion > 0){

        currentQuestion--;

        renderQuestion();
    }
}

function nextQuestion(){

    if(
        currentQuestion <
        questions.length - 1
    ){

        currentQuestion++;

        renderQuestion();
    }
}

renderQuestion();

<\/script>

</body>
</html>

`);
