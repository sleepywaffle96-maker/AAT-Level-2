<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Accounting Hub - Interactive Simulator</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #0B0F19 !important;
            color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
        }
        .back-home {
            display: inline-block;
            color: #38BDF8;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .back-home:hover { text-decoration: underline; }

        /* BOLLA BIANCA DEL SELEZIONATORE DI PARTENZA */
        .simulator-white-bubble {
            background: #FFFFFF !important;
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid #E2E8F0;
            color: #1E293B !important;
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 20px;
        }
        h1 { color: #0F172A !important; margin: 0 0 8px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { font-size: 14px; color: #64748B; margin: 0; }

        .filter-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .select-wrapper { display: flex; flex-direction: column; gap: 6px; }
        .select-label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #64748B; letter-spacing: 0.5px; }
        .custom-select { width: 100%; background-color: #F8FAFC; border: 1px solid #D1D5DB; color: #1E293B; font-size: 14px; border-radius: 10px; padding: 14px; font-weight: 700; cursor: pointer; outline: none; }
        
        .generate-btn { display: block; width: 100%; background: linear-gradient(135deg, #0D9488, #0F766E); color: #FFFFFF !important; border: none; border-radius: 12px; padding: 16px; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3); transition: opacity 0.2s; }
        .generate-btn:hover { opacity: 0.95; }
    </style>
</head>
<!-- RIFERIMENTO_BLOCCO: SIMULATORE_COMPLETO_7P_2 -->
<body>
<div class="container">
    <a href="index.html" class="back-home">&larr; Back to Dashboard</a>

    <div class="simulator-white-bubble">
        
        <div class="header-section">
            <h1>AAT Interactive Simulator</h1>
            <p class="subtitle">Configure your criteria parameters below to generate a paginated 15-task mock assessment window.</p>
        </div>

        <div class="filter-group">
            <div class="select-wrapper">
                <label class="select-label">Target Assessment Level</label>
                <select id="level-selector" class="custom-select" onchange="updateChapters()">
                    <option value="" selected disabled>Select Qualification Level...</option>
                    <option value="RANDOM">🎲 Randomize All Levels (Mixed Scenario)</option>
                    <option value="L2">📊 AAT Level 2 Certificate</option>
                    <option value="L3">🔹 AAT Level 3 Diploma</option>
                    <option value="L4">🔸 AAT Level 4 Diploma</option>
                </select>
            </div>

            <div class="select-wrapper">
                <label class="select-label">Syllabus Chapter Unit</label>
                <select id="chapter-selector" class="custom-select">
                    <option value="" selected disabled>Select a level first...</option>
                </select>
            </div>
        </div>

        <button onclick="launchPaginatedTestWindow()" class="generate-btn">
            Launch Paginated Test Window &rarr;
        </button>

    </div>
</div>
<!-- RIFERIMENTO_BLOCCO: SIMULATORE_COMPLETO_7P_3 -->
<script>
    const syllabusData = {
        "L2": [
            "Chapter 1: Bookkeeping Transactions",
            "Chapter 2: Bookkeeping Controls",
            "Chapter 3: Principles of Costing",
            "Chapter 4: Work Effectively in Finance"
        ],
        "L3": [
            "Chapter 1: Advanced Bookkeeping",
            "Chapter 2: Final Accounts Preparation",
            "Chapter 3: Management Accounting: Costing",
            "Chapter 4: Indirect Tax",
            "Chapter 5: Ethics for Accountants",
            "Chapter 6: Business Awareness"
        ],
        "L4": [
            "Chapter 1: Financial Statements of Limited Companies",
            "Chapter 2: Management Accounting: Budgeting",
            "Chapter 3: Management Accounting: Decision and Control",
            "Chapter 4: External Auditing",
            "Chapter 5: Cash and Treasury Management",
            "Chapter 6: Credit Management",
            "Chapter 7: Personal Tax",
            "Chapter 8: Business Tax",
            "Chapter 9: Internal Accounting Systems and Controls"
        ]
    };

    function updateChapters() {
        const lvl = document.getElementById("level-selector").value;
        const chapSel = document.getElementById("chapter-selector");
        
        chapSel.disabled = false;
        chapSel.innerHTML = "";
        
        if (lvl === "RANDOM") {
            let opt = document.createElement("option");
            opt.value = "ALL_RANDOM";
            opt.textContent = "🎲 Randomize Across All Syllabus Chapters";
            chapSel.appendChild(opt);
            return;
        }

        let optRand = document.createElement("option");
        optRand.value = "LEVEL_RANDOM";
        optRand.textContent = "🎲 Randomize Chapter Inside This Level";
        chapSel.appendChild(optRand);

        if (syllabusData[lvl]) {
            syllabusData[lvl].forEach((chap, idx) => {
                let opt = document.createElement("option");
                opt.value = "cap" + (idx + 1);
                opt.textContent = chap;
                chapSel.appendChild(opt);
            });
        }
    }
// RIFERIMENTO_BLOCCO: SIMULATORE_COMPLETO_7P_4
    function launchPaginatedTestWindow() {
        let lvl = document.getElementById("level-selector").value;
        let chap = document.getElementById("chapter-selector").value;
        
        if (!lvl || !chap) {
            alert("Please select both parameters before launching.");
            return;
        }

        if (lvl === "RANDOM") {
            const levels = ["L2", "L3", "L4"];
            lvl = levels[Math.floor(Math.random() * levels.length)];
        }

        let badgeClass = "background: #0D9488;";
        let badgeText = "Level 2 Full Assessment";
        if (lvl === "L3") { badgeClass = "background: #0284C7;"; badgeText = "Level 3 Full Assessment"; }
        if (lvl === "L4") { badgeClass = "background: #EA580C;"; badgeText = "Level 4 Full Assessment"; }

        const randomEntryNum = Math.floor(Math.random() * 900 + 100);
        const testWindow = window.open("", "_blank");

        testWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>AAT Paginated Exam - Entry #${randomEntryNum}</title>
                <link href="https://googleapis.com" rel="stylesheet">
                <style>
                    body { background-color: #0B0F19; color: #F3F4F6; font-family: 'Inter', sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; box-sizing: border-box; }
                    .test-card-container { width: 100%; max-width: 720px; background: #FFFFFF; color: #1E293B; border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #E2E8F0; box-sizing: border-box; display: none; }
                    .test-card-container.active { display: block; }
                    .header-area { border-bottom: 2px dashed #E2E8F0; padding-bottom: 12px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
                    .level-tag { font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; color: #FFFFFF; ${badgeClass} }
                    .difficulty-tag { font-size: 11px; font-weight: 700; color: #4B5563; background: #F1F5F9; padding: 4px 10px; border-radius: 6px; border: 1px solid #E5E7EB; }
                    .question-title { font-size: 17px; font-weight: 800; color: #0F172A; margin: 5px 0; }
                    
                    .option-row { display: flex; align-items: center; justify-content: space-between; background: #F8FAFC; border: 1px solid #D1D5DB; border-radius: 6px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
                    .option-row:hover { background: #F1F5F9; }
                    .option-text-left { font-size: 13.5px; font-weight: 600; color: #334155; }
                    .option-right-inputs { display: flex; align-items: center; gap: 12px; }
                    
                    .option-row.reveal-correct { background-color: #DCFCE7 !important; border-color: #10B981 !important; box-shadow: 0 0 12px rgba(16, 185, 129, 0.2); }
                    
                    .feedback-marker { font-size: 15px; font-weight: bold; display: none; }
                    .feedback-correct { color: #10B981; }
                    .feedback-wrong { color: #EF4444; }
                    
                    .osborne-footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; width: 100%; max-width: 720px; margin-top: 20px; }
                    .osborne-btn { border: 1px solid #CBD5E1; border-radius: 6px; padding: 12px 4px; font-size: 11.5px; font-weight: 700; cursor: pointer; text-align: center; background: #F8FAFC; color: #334155; outline: none; }
                    .osborne-btn:hover { background: #F1F5F9; }
                    .btn-verify { background: #1E293B; color: #FFFFFF; border-color: #1E293B; }
                    .btn-verify:hover { background: #0F172A; }
                    .btn-solution { background: #0284C7; color: #FFFFFF; border-color: #0284C7; }
                    .btn-solution:hover { background: #0369A1; }
                    
                    .calc-widget-floating { position: fixed; bottom: 20px; right: 20px; width: 280px; z-index: 9999; background: rgba(16, 24, 48, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(0, 242, 254, 0.25); border-radius: 10px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6); overflow: hidden; }
                    .calc-widget-header { background: rgba(0, 242, 254, 0.15); padding: 0.8rem 1rem; font-weight: 600; font-size: 0.9rem; color: #00f2fe; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 242, 254, 0.15); user-select: none; }
                    .calc-widget-body { padding: 1rem; display: none; }
                    .calc-display { width: 100%; padding: 0.6rem; background: #070b14; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 4px; color: #00f2fe; font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; text-align: right; margin-bottom: 1rem; box-sizing: border-box; }
                    .calc-btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
                    .calc-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 4px; padding: 0.6rem; color: #f8fafc; font-size: 1rem; font-weight: 600; cursor: pointer; }
                    .btn-sci { color: #4facfe; background: rgba(79, 172, 254, 0.05); }
                    .btn-op { color: #00f2fe; background: rgba(0, 242, 254, 0.05); }
                    .btn-equals { background: #00f2fe; color: #0a0f1d; }
                    @media print {
                        body { background: #FFFFFF !important; color: #000000 !important; padding: 0; }
                        .test-card-container { box-shadow: none !important; border: none !important; padding: 20px 0 !important; page-break-inside: avoid; display: block !important; }
                        .action-footer, .calc-widget-floating, .osborne-footer-grid { display: none !important; }
                    }
                </style>
            </head>
// RIFERIMENTO_BLOCCO: SIMULATORE_COMPLETO_7P_5
            <body>
                <div style="width: 100%; max-width: 720px; display: flex; flex-direction: column; align-items: center;">
                    <div id="questions-root-wrapper" style="width: 100%;"></div>
                </div>

                <div class="osborne-footer-grid">
                    <button onclick="verifyCurrentInline()" class="osborne-btn btn-verify">Am I right?</button>
                    <button onclick="showCurrentSolution()" class="osborne-btn btn-solution">Show Solution</button>
                    <button onclick="resetCurrentForm()" class="osborne-btn">Reset</button>
                    <button onclick="changeQuestion(-1)" class="osborne-btn">&larr;&larr;&larr; previous question</button>
                    <button onclick="changeQuestion(1)" class="osborne-btn">next question &rarr;&rarr;&rarr;</button>
                    <button id="osborne-pdf-trigger" onclick="triggerAutoPDFDownload()" class="osborne-btn" style="display: none; background: #00796B; color: white; border-color: #00796B; box-shadow: 0 4px 12px rgba(0,121,107,0.15);">💾 Download as PDF</button>
                </div>

                <div id="floatingCalcWidget" class="calc-widget-floating">
                    <div class="calc-widget-header" onclick="toggleCalculatorView()">
                        <span>🧮 AAT Exam Calculator</span>
                        <span id="calcToggleArrow">▲</span>
                    </div>
                    <div id="calcWidgetBody" class="calc-widget-body">
                        <input type="text" id="calcDisplayScreen" class="calc-display" readonly value="0">
                        <div class="calc-btn-grid">
                            <button class="calc-btn btn-sci" onclick="pushCalcFunction('sqrt')">√</button>
                            <button class="calc-btn btn-sci" onclick="pushCalcFunction('pow')">x²</button>
                            <button class="calc-btn btn-sci" onclick="pushCalcFunction('percent')">%</button>
                            <button class="calc-btn btn-sci" onclick="clearCalcScreen()">C</button>
                            <button class="calc-btn" onclick="pushCalcChar('7')">7</button>
                            <button class="calc-btn" onclick="pushCalcChar('8')">8</button>
                            <button class="calc-btn" onclick="pushCalcChar('9')">9</button>
                            <button class="calc-btn btn-op" onclick="pushCalcChar('/')">/</button>
                            <button class="calc-btn" onclick="pushCalcChar('4')">4</button>
                            <button class="calc-btn" onclick="pushCalcChar('5')">5</button>
                            <button class="calc-btn" onclick="pushCalcChar('6')">6</button>
                            <button class="calc-btn btn-op" onclick="pushCalcChar('*')">*</button>
                            <button class="calc-btn" onclick="pushCalcChar('1')">1</button>
                            <button class="calc-btn" onclick="pushCalcChar('2')">2</button>
                            <button class="calc-btn" onclick="pushCalcChar('3')">3</button>
                            <button class="calc-btn btn-op" onclick="pushCalcChar('-')">-</button>
                            <button class="calc-btn" onclick="pushCalcChar('0')">0</button>
                            <button class="calc-btn" onclick="pushCalcChar('.')">.</button>
                            <button class="calc-btn btn-equals" onclick="executeCalcExpression()">=</button>
                            <button class="calc-btn btn-op" onclick="pushCalcChar('+')">+</button>
                        </div>
                    </div>
                </div>
// RIFERIMENTO_BLOCCO: SIMULATORE_COMPLETO_PARTE_6_UNIFICATO
                    function triggerAutoPDFDownload() {
                        const originalTitle = document.title;
                        document.title = "AAT_Official_Exam_Worksheet_" + Math.floor(Math.random() * 9000 + 1000);
                        window.print();
                        setTimeout(() => { document.title = originalTitle; }, 500);
                    }

                    function showCurrentSolution() {
                        const activeCard = document.getElementById("card_task_" + currentActiveIndex);
                        const correctLetter = activeCard.getAttribute("data-correct");
                        const rows = activeCard.querySelectorAll(".option-row");
                        rows.forEach(r => r.classList.remove("reveal-correct"));
                        const correctRadio = document.getElementById("opt_" + currentActiveIndex + "_" + correctLetter);
                        if (correctRadio) {
                            const targetRow = correctRadio.closest(".option-row");
                            if (targetRow) targetRow.classList.add("reveal-correct");
                        }
                    }

                    function verifyCurrentInline() {
                        const activeCard = document.getElementById("card_task_" + currentActiveIndex);
                        const correctVal = activeCard.getAttribute("data-correct");
                        const rA = document.getElementById("opt_" + currentActiveIndex + "_A");
                        const rB = document.getElementById("opt_" + currentActiveIndex + "_B");
                        const rC = document.getElementById("opt_" + currentActiveIndex + "_C");
                        const mA = document.getElementById("mark_" + currentActiveIndex + "_A");
                        const mB = document.getElementById("mark_" + currentActiveIndex + "_B");
                        const mC = document.getElementById("mark_" + currentActiveIndex + "_C");

                        mA.style.display = "none";
                        mB.style.display = "none";
                        mC.style.display = "none";

                        if (rA.checked) {
                            mA.style.display = "block";
                            mA.innerHTML = correctVal === "A" ? '<span class="feedback-correct">✔️</span>' : '<span class="feedback-wrong">❌</span>';
                        } else if (rB.checked) {
                            mB.style.display = "block";
                            mB.innerHTML = correctVal === "B" ? '<span class="feedback-correct">✔️</span>' : '<span class="feedback-wrong">❌</span>';
                        } else if (rC.checked) {
                            mC.style.display = "block";
                            mC.innerHTML = correctVal === "C" ? '<span class="feedback-correct">✔️</span>' : '<span class="feedback-wrong">❌</span>';
                        }
                    }

                    function resetCurrentForm() {
                        const activeCard = document.getElementById("card_task_" + currentActiveIndex);
                        document.getElementById("mark_" + currentActiveIndex + "_A").style.display = "none";
                        document.getElementById("mark_" + currentActiveIndex + "_B").style.display = "none";
                        document.getElementById("mark_" + currentActiveIndex + "_C").style.display = "none";
                        const rows = activeCard.querySelectorAll(".option-row");
                        rows.forEach(r => r.classList.remove("reveal-correct"));
                        document.getElementById("opt_" + currentActiveIndex + "_A").checked = false;
                        document.getElementById("opt_" + currentActiveIndex + "_B").checked = false;
                        document.getElementById("opt_" + currentActiveIndex + "_C").checked = false;
                    }

                    let isCalcBodyExpanded = false;
                    let calcCurrentExpressionString = "";

                    function toggleCalculatorView() {
                        const body = document.getElementById("calcWidgetBody");
                        const arrow = document.getElementById("calcToggleArrow");
                        isCalcBodyExpanded = !isCalcBodyExpanded;
                        if (isCalcBodyExpanded) { body.style.display = "block"; arrow.textContent = "▼"; }
                        else { body.style.display = "none"; arrow.textContent = "▲"; }
                    }

                    function pushCalcChar(char) {
                        const display = document.getElementById("calcDisplayScreen");
                        if (display.value === "0" && char !== ".") { calcCurrentExpressionString = char; }
                        else { calcCurrentExpressionString += char; }
                        display.value = calcCurrentExpressionString;
                    }

                    function clearCalcScreen() {
                        calcCurrentExpressionString = "";
                        document.getElementById("calcDisplayScreen").value = "0";
                    }

                    function pushCalcFunction(type) {
                        const display = document.getElementById("calcDisplayScreen");
                        let val = parseFloat(display.value) || 0;
                        if (type === 'sqrt') {
                            if (val < 0) { display.value = "Error"; calcCurrentExpressionString = ""; return; }
                            val = Math.sqrt(val);
                        } else if (type === 'pow') { val = Math.pow(val, 2); }
                        else if (type === 'percent') { val = val / 100; }
                        calcCurrentExpressionString = Number(val.toFixed(6)).toString();
                        display.value = calcCurrentExpressionString;
                    }

                    function executeCalcExpression() {
                        const display = document.getElementById("calcDisplayScreen");
                        if (!calcCurrentExpressionString) return;
                        try {
                            let res = new Function('return (' + calcCurrentExpressionString + ')')();
                            if (res === Infinity || isNaN(res)) { display.value = "Error"; calcCurrentExpressionString = ""; }
                            else { calcCurrentExpressionString = Number(res.toFixed(6)).toString(); display.value = calcCurrentExpressionString; }
                        } catch (e) { display.value = "Syntax Error"; calcCurrentExpressionString = ""; }
                    }
                <\/script>
            </body>
            </html>
        `);
        testWindow.document.close();
    }
</script>
</body>
</html>
