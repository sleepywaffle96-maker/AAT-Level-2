<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Exam Simulator - Platform Dashboard</title>
    <style>
        /* --- DESIGN SYSTEM RESETS & GLOBAL BACKGROUND --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Mask layer over official financial background image */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://wikimedia.org');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- MAIN HUB CONTAINER (PLANCIA) --- */
        .hub-container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        h1 {
            color: #0f172a; /* Blu Notte */
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* --- CONTROLS PANEL --- */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            background-color: white;
            color: #0f172a;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #0284c7; /* Cyan/Azzurro */
        }

        /* --- ACTION BUTTON --- */
        .btn-generate {
            background-color: #0284c7; /* Cyan/Azzurro */
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.4);
            margin-top: 10px;
        }

        .btn-generate:hover {
            background-color: #0369a1;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .placeholder-text {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>

    <body>

    <div class="hub-container">
        <h1>AAT Infinite Exam Simulator</h1>
        <p class="subtitle">Generate unique algorithmic accounting test scenarios on-demand.</p>
        
        <div class="controls-panel">
            <div class="select-group">
                <label for="select-level">Select Level</label>
                <select id="select-level">
                    <option value="2">Level 2 (Foundation)</option>
                    <option value="3">Level 3 (Advanced)</option>
                    <option value="4">Level 4 (Professional)</option>
                </select>
            </div>
            
            <div class="select-group">
                <label for="select-subject">Select Subject / Chapter Module</label>
                <select id="select-subject">
                    <option value="vat">VAT Separation Scenarios</option>
                    <option value="highlow">High-Low Method Analysis</option>
                    <option value="dso">Days Sales Outstanding (DSO)</option>
                    <option value="goodwill">Goodwill Calculations</option>
                </select>
            </div>

            <button class="btn-generate" onclick="launchExamSession()">
                Generate Full Test (15 Questions)
            </button>
        </div>

        <p class="placeholder-text">The exam session will open in a new window containing 15 randomized tasks. No questions are generated until you click the button.</p>
    </div>

            <!-- --- SIMULATION CORE MATHEMATICAL ENGINES --- -->
    <script>
        const simulationEngine = {
            // 1. VAT Separation
            vat() {
                const gross = (Math.random() * 8000 + 400).toFixed(2);
                const net = (gross / 1.20).toFixed(2);
                return {
                    question: `An organization processes a supplier invoice totaling <strong>£${gross}</strong> gross, which includes standard UK VAT at 20%. Calculate the net expenditure component to be debited to the expense ledger.`,
                    answer: net,
                    hint: "Divide Gross by 1.20 to strip the 20% VAT."
                };
            },
            // 2. High-Low Method
            highlow() {
                const lowUnits = Math.floor(Math.random() * 800) + 200;
                const highUnits = Math.floor(Math.random() * 2000) + 1200;
                const vcu = Math.floor(Math.random() * 12) + 4;
                const fixed = Math.floor(Math.random() * 8000) + 1500;
                const lowCost = fixed + (lowUnits * vcu);
                const highCost = fixed + (highUnits * vcu);
                return {
                    question: `The financial records of a manufacturing unit show total costs of <strong>£${lowCost}</strong> at <strong>${lowUnits} units</strong> of output, and <strong>£${highCost}</strong> at <strong>${highUnits} units</strong>. Using the High-Low method, deduce the total fixed costs.`,
                    answer: fixed.toString(),
                    hint: "Variable Cost per Unit = (Change in Cost / Change in Activity). Then, Fixed Cost = Total Cost - Total Variable Cost."
                };
            },
            // 3. Days Sales Outstanding (DSO)
            dso() {
                const creditSales = Math.floor(Math.random() * 400000) + 100000;
                const days = 365;
                const targetedDso = Math.floor(Math.random() * 25) + 30;
                const receivables = Math.round((targetedDso * creditSales) / days);
                const finalDso = Math.round((receivables / creditSales) * days);
                return {
                    question: `At the financial year-end, a company reports total credit sales of <strong>£${creditSales}</strong> and gross trade receivables of <strong>£${receivables}</strong>. Compute the Days Sales Outstanding (DSO) rounded to the nearest whole day.`,
                    answer: finalDso.toString(),
                    hint: "(Trade Receivables / Total Credit Sales) * 365 days."
                };
            },
            // 4. Goodwill Calculation
            goodwill() {
                const consideration = Math.floor(Math.random() * 300000) + 500000;
                const netAssets = Math.floor(Math.random() * 200000) + 250000;
                const nci = Math.floor(Math.random() * 50000) + 40000;
                const finalGoodwill = consideration + nci - netAssets;
                return {
                    question: `An entity acquires a subsidiary. The purchase consideration paid is <strong>£${consideration}</strong>. The fair value of the Non-Controlling Interest (NCI) is evaluated at <strong>£${nci}</strong>. If the identifiable net assets at acquisition date equate to <strong>£${netAssets}</strong>, isolate the goodwill figure arising on consolidation.`,
                    answer: finalGoodwill.toString(),
                    hint: "Goodwill = Consideration Transferred + Non-Controlling Interest - Fair Value of Net Identifiable Assets."
                };
            }
        };

                // --- EXAM WINDOW GENERATOR AND POPULATOR ---
        function launchExamSession() {
            const levelSelected = document.getElementById("select-level").value;
            const subjectKey = document.getElementById("select-subject").value;
            const subjectLabel = document.getElementById("select-subject").options[document.getElementById("select-subject").selectedIndex].text;
            
            const totalQuestions = 15;
            let questionsData = [];

            // Compile exactly 15 dynamic questions array
            for (let i = 0; i < totalQuestions; i++) {
                questionsData.push(simulationEngine[subjectKey]());
            }

            // Open target empty window/tab
            const examWindow = window.open("", "_blank");
            
            // Build standalone HTML content matching the existing chapter styles
            let htmlContent = `
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>AAT Mock Test - Level ${levelSelected} - ${subjectLabel}</title>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
                    body {
                        background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                                    url('https://wikimedia.org');
                        background-size: cover; background-position: center; background-attachment: fixed;
                        padding: 40px 20px; color: #0f172a; display: flex; flex-direction: column; align-items: center;
                    }
                    .exam-container {
                        background: rgba(255, 255, 255, 0.98); width: 100%; max-width: 850px;
                        border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                    }
                    .header-block {
                        border-bottom: 3px solid #0284c7; padding-bottom: 20px; margin-bottom: 30px;
                        display: flex; justify-content: space-between; align-items: center;
                    }
                    .header-block h2 { color: #0f172a; font-size: 1.6rem; }
                    .header-block span { background: #0f172a; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold;}
                    
                    .task-card {
                        background: #f8fafc; border: 1px solid #e2e8f0; border-left: 5px solid #0284c7;
                        padding: 20px; margin-bottom: 25px; border-radius: 6px; transition: transform 0.2s;
                    }
                    .task-card:hover { transform: translateX(2px); }
                    .task-number { font-weight: bold; color: #0f172a; font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase; }
                    .task-text { font-size: 1.05rem; line-height: 1.5; color: #334155; margin-bottom: 15px; }
                    
                    .interaction-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
                    .input-field { padding: 8px 12px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 1rem; width: 200px; outline: none; }
                    .input-field:focus { border-color: #0284c7; }
                    
                    .btn-check { background-color: #0d9488; color: white; border: none; padding: 9px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
                    .btn-check:hover { background-color: #0f766e; }
                    
                    .feedback-box { font-weight: bold; font-size: 0.95rem; margin-top: 5px; min-height: 20px; }
                    .hint-box { color: #64748b; font-size: 0.85rem; margin-top: 8px; display: block; font-style: italic; }
                    
                    .score-bar { background: #0f172a; color: white; padding: 20px; border-radius: 8px; text-align: center; font-size: 1.2rem; font-weight: bold; margin-top: 20px; }
                </style>
            </head>
            <body>
                <div class="exam-container">
                    <div class="header-block">
                        <div>
                            <h2>AAT Mock Examination Session</h2>
                            <p style="color: #64748b; font-size: 0.9rem; margin-top: 4px;">Module: ${subjectLabel}</p>
                        </div>
                        <span>LEVEL ${levelSelected}</span>
                    </div>

                    <form id="examForm" onsubmit="return false;">
            `;

            // Loop and injection of the 15 tasks into the HTML template
            questionsData.forEach((task, index) => {
                const qNum = index + 1;
                htmlContent += `
                    <div class="task-card">
                        <div class="task-number">Task ${qNum} of 15</div>
                        <div class="task-text">${task.question}</div>
                        <div class="interaction-row">
                            <input type="number" step="0.01" id="ans-${qNum}" class="input-field" placeholder="Enter amount (£)">
                            <button type="button" class="btn-check" onclick="verifyTask(${qNum}, '${task.answer}')">Check Answer</button>
                        </div>
                        <div id="feed-${qNum}" class="feedback-box"></div>
                        <small class="hint-box">Helpful Hint: ${task.hint}</small>
                    </div>
                `;
            });

            // Footer layout with score board trackers
            htmlContent += `
                    </form>
                    <div class="score-bar" id="overallScoreBar">
                        Current Performance: Checked tasks will update overall accuracy.
                    </div>
                </div>

                <script>
                    // Tracks correctly validated tasks
                    let trackingScores = {};

                    window.verifyTask = function(id, correctVal) {
                        const userIn = parseFloat(document.getElementById('ans-' + id).value);
                        const feedbackElement = document.getElementById('feed-' + id);
                        const expected = parseFloat(correctVal);

                        if (isNaN(userIn)) {
                            feedbackElement.innerText = "Please input a numeric value before validating.";
                            feedbackElement.style.color = "#ea580c"; 
                            return;
                        }

                        // Tolerance check for floating numbers accounting bounds
                        if (Math.abs(userIn - expected) < 0.05) {
                            feedbackElement.innerText = "✓ Correct! Well done.";
                            feedbackElement.style.color = "#0d9488"; /* Teal/Verde Acqua */
                            trackingScores[id] = 1;
                        } else {
                            feedbackElement.innerText = "✗ Incorrect. Expected Balance: £" + expected.toFixed(2);
                            feedbackElement.style.color = "#ef4444"; 
                            trackingScores[id] = 0;
                        }
                        
                        updateTotalDashboard();
                    };

                    function updateTotalDashboard() {
                        const totalAnswered = Object.keys(trackingScores).length;
                        let correctAnswersCount = 0;
                        for (let x in trackingScores) {
                            if (trackingScores[x] === 1) correctAnswersCount++;
                        }
                        
                        const scoreBar = document.getElementById('overallScoreBar');
                        const percentage = ((correctAnswersCount / 15) * 100).toFixed(0);
                        scoreBar.innerHTML = "Score: " + correctAnswersCount + " / 15 Correct Answers (" + percentage + "%) - Total Verified: " + totalAnswered + "/15 Tasks";
                        
                        if(percentage >= 70) {
                            scoreBar.style.background = "#0d9488"; /* Success Teal */
                        } else {
                            scoreBar.style.background = "#0f172a"; /* Default Blu Notte */
                        }
                    }
                <\/script>
            </body>
            </html>
            `;

            // Document write execution into the new clean window instance
            examWindow.document.open();
            examWindow.document.write(htmlContent);
            examWindow.document.close();
        }
    </script>
</body>
</html>
