<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Interactive Simulator Matrix</title>
    <style>
        :root {
            --bg-dark: #0B0F19;
            --card-white: #FFFFFF;
            --primary-teal: #117A71;
            --primary-hover: #0E635C;
            --text-dark: #1F2937;
            --text-muted: #64748B;
            --border-light: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .back-link {
            display: inline-block;
            color: #0284C7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            color: #0F172A;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            background-color: #F8FAFC;
            color: #0F172A;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-teal);
            box-shadow: 0 0 0 3px rgba(17, 122, 113, 0.15);
        }

        .launch-btn {
            width: 100%;
            background-color: var(--primary-teal);
            color: white;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s ease;
            margin-top: 32px;
        }

        .launch-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <a href="#" class="back-link">← Back to Dashboard</a>
        <h1>AAT Interactive Simulator</h1>
        <p class="subtitle">Configure your criteria parameters below to generate a paginated 15-task mock assessment window.</p>
        
        <div class="form-group">
            <label>Target Assessment Level</label>
            <select id="level-select" onchange="updateChapters()">
                <option value="" disabled selected>Select Qualification Level...</option>
                <option value="L2">AAT Level 2 Certificate</option>
                <option value="L3">AAT Level 3 Diploma</option>
            </select>
        </div>

        <div class="form-group">
            <label>Syllabus Chapter Unit</label>
            <select id="chapter-select">
                <option value="" disabled selected>Select a level first...</option>
            </select>
        </div>

        <button class="launch-btn" onclick="launchPaginatedTestWindow()">
            Launch Paginated Test Window →
        </button>
    </div>
<script>
// --- CONFIGURAZIONE SYLLABUS DATA AGGIORNATA ---
const syllabusData = {
    "L2": [
        { id: 1, title: "Chapter 1: Introduction to Bookkeeping" },
        { id: 2, title: "Chapter 2: Sales and Purchase Day Books" },
        { id: 3, title: "Chapter 3: Cash Book & Petty Cash Imprest" },
        { id: 4, title: "Chapter 4: The General Journal & Corrections" },
        { id: 5, title: "Chapter 5: The Trial Balance Matrix & DEAD CLIC" }
    ],
    "L3": [
        { id: 1, title: "Advanced Financial Accounting (FAPR)" }
    ]
};

function updateChapters() {
    const lvlSelect = document.getElementById('level-select');
    const chapSelect = document.getElementById('chapter-select');
    
    if (!lvlSelect || !chapSelect) return;
    
    const selectedLevel = lvlSelect.value;
    chapSelect.innerHTML = '';

    if (!selectedLevel || !syllabusData[selectedLevel]) {
        chapSelect.innerHTML = '<option value="" disabled selected>Select a level first...</option>';
        return;
    }

    syllabusData[selectedLevel].forEach(ch => {
        const opt = document.createElement('option');
        opt.value = `cap${ch.id}`;
        opt.textContent = ch.title;
        chapSelect.appendChild(opt);
    });
}
function launchPaginatedTestWindow() {
    const lvlSelector = document.getElementById('level-select');
    const chapSelector = document.getElementById('chapter-select');
    
    if (!lvlSelector || !chapSelector) return;
    
    let lvl1 = lvlSelector.value;
    let chap = chapSelector.value;

    if (!lvl1 || !chap) {
        alert("Please select both a Qualification Level and a Chapter Unit.");
        return;
    }

    // RISOLUZIONE BUG: Estrae il numero puro dal valore della tendina (es. "cap5" -> 5)
    const targetChapterNum = parseInt(chap.replace("cap", ""), 10);
    const scenarios = questionsDatabase.filter(q => q.level === lvl1 && q.chapter === targetChapterNum);

    if (scenarios.length === 0) {
        alert("No questions found inside the database for this specific module selection.");
        return;
    }

    // Mescola e seleziona fino a un massimo di 15 domande a caso
    const testQuestions = scenarios.sort(() => 0.5 - Math.random()).slice(0, 15);
    
    const testWindow = window.open("", "_blank");
    if (!testWindow) {
        alert("Popup blocked! Please allow popups to launch the simulator assessment.");
        return;
    }

    testWindow.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AAT Simulator Matrix Window</title>
    <style>
        body { background-color: #0B0F19; color: #1F2937; font-family: Arial, sans-serif; padding: 40px 20px; }
        .white-bubble { background: #FFFFFF; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .q-card { background: #F8FAFC; border: 1px solid #E5E7EB; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .q-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; color: #0F172A; }
        .field-row { margin-top: 10px; font-weight: 600; font-size: 14px; }
        .num-field { width: 130px; padding: 6px; border: 1px solid #CBD5E1; border-radius: 4px; text-align: right; }
    </style>
</head>
<body>
    <div class="white-bubble">
        <h2 style="margin-bottom:20px; border-bottom:2px solid #E5E7EB; padding-bottom:10px; color:#111827;">AAT RANDOMIZED SIMULATION</h2>
        <div id="container-slots"></div>
    </div>
</body>
</html>
    `);
    testWindow.document.close();

    const slotsDiv = testWindow.document.getElementById('container-slots');
    testQuestions.forEach((q, idx) => {
        const div = testWindow.document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <div class="q-title">${idx + 1}. ${q.text}</div>
            <div class="field-row">
                <span>Your Answer:</span>
                <input type="text" class="num-field" placeholder="0">
            </div>
            <div style="font-size:11px; margin-top:6px; color:#64748B; font-weight:bold;">${q.diff}</div>
        `;
        slotsDiv.appendChild(div);
    });
}
// --- DATABASE INTEGRATO DELLE DOMANDE ---
const questionsDatabase = [
    // Esempi Capitolo 1
    { id: "l2_c1_q1", level: "L2", chapter: 1, text: "Which financial accounting book registers prompt credit raw sales invoices?", correct: "Sales Day Book", diff: "🟢 Difficulty: Entry Level" },
    
    // Nuove Domande Iniettate per il Capitolo 5
    { id: "l2_c5_q1", level: "L2", chapter: 5, text: "Under the DEAD CLIC framework, which nominal accounts have balances placed in the Credit column of a Trial Balance?", correct: "Liabilities, Income, Capital Base", diff: "🔴 Difficulty: Professional Level" },
    { id: "l2_c5_q2", level: "L2", chapter: 5, text: "A Trial Balance has a Debit total of £24,650 and a Credit total of £24,200. Calculate the temporary Suspense Account opening balance (£).", correct: "450", diff: "🟡 Difficulty: Intermediate" },
    { id: "l2_c5_q3", level: "L2", chapter: 5, text: "If an office stationery invoice for £150 is debited to the Machinery Asset account instead of Stationery Expenses, what category of error is formed?", correct: "Error of Principle", diff: "🟢 Difficulty: Entry Level" }
];
</script>
</body>
</html>
