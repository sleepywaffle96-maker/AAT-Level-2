<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Level 3 - FAPR Live Assessment Simulator</title>
    <style>
        /* Reset Globale e Layout Base */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #0B0F19; min-height: 100vh; padding: 30px 20px; padding-top: 80px; display: flex; flex-direction: column; align-items: center; }

        /* Barra Superiore Scura Ufficiale */
        .top-assessment-bar { position: fixed; top: 0; left: 0; width: 100%; background-color: #111827; border-bottom: 2px solid #1F2937; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 4000; color: #FFFFFF; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }
        .top-right-controls { display: flex; align-items: center; gap: 15px; }
        .top-calc-btn { background-color: #374151; color: #F3F4F6; border: 1px solid #4B5563; padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .top-calc-btn:hover { background-color: #4B5563; }
        .top-timer { background-color: #000000; border: 1px solid #374151; padding: 6px 16px; border-radius: 4px; color: #FFFFFF; font-size: 14px; font-family: monospace; font-weight: bold; }

        /* Contenitore Principale (Bolla Bianca Protetta) */
        .assessment-container { background-color: #FFFFFF; width: 100%; max-width: 1000px; border-radius: 8px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); min-height: 520px; display: flex; flex-direction: column; justify-content: space-between; }

        /* Griglia Orizzontale dei Task (Top Navigation) */
        .tasks-nav-scroll { display: flex; align-items: center; border-bottom: 2px solid #E5E7EB; padding-bottom: 12px; margin-bottom: 20px; width: 100%; overflow-x: auto; gap: 8px; scroll-behavior: smooth; }
        .tasks-nav-scroll::-webkit-scrollbar { height: 4px; }
        .tasks-nav-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
        
        .task-tab-btn { background: #F3F4F6; border: 1px solid #E5E7EB; border-radius: 4px; padding: 8px 14px; font-size: 11px; font-weight: bold; color: #4B5563; cursor: pointer; text-align: center; min-width: 95px; white-space: nowrap; }
        .task-tab-btn.active { background-color: #059669; color: white; border-color: #059669; }

        /* Area dei Contenuti dei Task */
        .task-panel-wrapper { flex-grow: 1; display: flex; flex-direction: column; }
        .task-panel { display: none; flex-direction: column; }
        .task-panel.active { display: flex; }
        
        .focus-header { font-size: 11px; font-weight: 800; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .focus-instruction { font-size: 15px; font-weight: 700; color: #0F172A; margin-bottom: 20px; }
        .task-question-text { font-size: 14px; color: #334155; margin-bottom: 20px; line-height: 1.5; }

        /* Box Opzioni e Input Numerici */
        .option-box-row { display: flex; align-items: center; padding: 14px 18px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #F9FAFB; cursor: pointer; margin-bottom: 10px; transition: background 0.15s; }
        .option-box-row:hover { background-color: #F3F4F6; border-color: #CBD5E1; }
        .option-box-row input[type="radio"] { margin-right: 12px; width: 16px; height: 16px; cursor: pointer; }
        .option-text-label { font-size: 13.5px; color: #1F2937; font-weight: 500; }
        
        .input-box-row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #F9FAFB; max-width: 380px; }
        .input-box-row span { font-size: 13.5px; color: #4B5563; font-weight: 600; }
        .numeric-field { width: 120px; padding: 6px 10px; border: 1px solid #CBD5E1; border-radius: 4px; text-align: right; font-weight: 700; font-size: 14px; }
        .numeric-field:focus { outline: none; border-color: #2563EB; }

        /* Footer Pulsantiera Divisa Simmetricamente */
        .assessment-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #E5E7EB; padding-top: 20px; margin-top: 25px; }
        .footer-group { display: flex; gap: 10px; }
        .btn-action { padding: 9px 18px; font-size: 13px; font-weight: 700; border-radius: 4px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-nav-prev { background-color: #E5E7EB; color: #4B5563; }
        .btn-nav-next { background-color: #3B82F6; color: white; }
        .btn-util-reset { background-color: #EF4444; color: white; }
        .btn-util-submit { background-color: #059669; color: white; }

        /* Pannello Risultati Audit */
        #results-panel { display: none; background: #EEF2F6; border: 2px solid #94A3B8; border-radius: 6px; padding: 25px; margin-top: 25px; }
        .explanation-box { background: white; border-left: 4px solid #0284C7; padding: 15px; margin-top: 15px; border-radius: 4px; font-size: 13.5px; line-height: 1.6; }

        /* Calcolatrice "Osborne Calc" */
        #calc-widget { position: fixed; bottom: 90px; right: 30px; width: 240px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 14px; padding: 18px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 2000; display: none; cursor: move; }
        #calc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #calc-header span { color: #64748B; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        #calc-close-btn { background: transparent; border: none; color: #EF4444; font-weight: bold; cursor: pointer; font-size: 14px; }
        #calc-screen { width: 100%; height: 45px; background: #000000; border-radius: 8px; color: #00FFFF; text-shadow: 0 0 10px #00FFFF; font-family: 'Courier New', Courier, monospace; text-align: right; padding: 12px; font-size: 20px; font-weight: bold; margin-bottom: 12px; border: 1px solid #00FFFF; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { background: rgba(255, 255, 255, 0.08); border: none; color: white; padding: 12px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.15s ease; }
        .calc-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .calc-btn.op { color: #00FFFF; background: rgba(0, 255, 255, 0.05); }
        .calc-btn.op:hover { background: rgba(0, 255, 255, 0.2); }
    </style>
</head>
<body>
    <!-- Barra Superiore Scura Assestment AAT -->
    <div class="top-assessment-bar">
        <div>📌 AAT LEVEL 3: FAPR LIVE ASSESSMENT</div>
        <div class="top-right-controls">
            <button class="top-calc-btn" id="top-calc-trigger">🧮 Calculator</button>
            <div class="top-timer" id="time-display">60:00</div>
        </div>
    </div>

    <!-- Bolla Bianca Centrale dell'Esame -->
    <div class="assessment-container">
        <form id="mock-assessment-form" onsubmit="return false;">
            
            <!-- Barra di Navigazione Orizzontale dei Task (Identica alla foto) -->
            <div class="tasks-nav-scroll" id="tasks-buttons-container">
                <!-- Generati dinamicamente da JS per mantenere pulito il codice: Task 1 10pt ... Task 15 10pt -->
            </div>

            <!-- Contenitore Principale dove compaiono i Panel dei Task -->
            <div class="task-panel-wrapper" id="dynamic-tasks-placeholder"></div>
        </form>

        <!-- Barra di Controllo Inferiore Simmetrica AAT (Identica alla foto) -->
        <div class="assessment-footer">
            <div class="footer-group">
                <button type="button" class="btn-action btn-nav-prev" id="btn-prev" disabled>⬅️ Previous</button>
                <button type="button" class="btn-action btn-nav-next" id="btn-next">Next ➡️</button>
            </div>
            <div class="footer-group">
                <button type="button" class="btn-action btn-util-reset" id="btn-reset">🔄 Reset</button>
                <button type="button" class="btn-action btn-util-submit" id="btn-submit" onclick="processExamSubmission()">🏆 Submit</button>
            </div>
        </div>

        <!-- Pannello dei Risultati e Audit dei Passaggi Logici -->
        <div id="results-panel">
            <h2 style="color: #0F172A; font-weight: 800; font-size: 20px; text-align: center; margin-bottom: 10px;">EXAM PERFORMANCE AUDIT REPORT</h2>
            <div style="font-size: 36px; font-weight: 800; color: #0369A1; text-align: center; margin: 15px 0;" id="percentage-score">0%</div>
            <p id="pass-fail-feedback" style="font-weight: 700; font-size: 16px; text-align: center; margin-bottom: 25px;"></p>
            <div id="rationales-placeholder"></div>
        </div>
    </div>

    <!-- WIDGET CALCOLATRICE INTERATTIVA ORIGINAL NATIVE "Osborne Calc" -->
    <div id="calc-widget">
        <div id="calc-header">
            <span>Osborne Calc</span>
            <button id="calc-close-btn" title="Hide">✕</button>
        </div>
        <div id="calc-screen">0</div>
        <div class="calc-grid">
            <button class="calc-btn op" onclick="clearCalc()">C</button>
            <button class="calc-btn op" onclick="pressCalc('sq')">x²</button>
            <button class="calc-btn op" onclick="pressCalc('rt')">√</button>
            <button class="calc-btn op" onclick="pressCalc('/')">/</button>
            <button class="calc-btn" onclick="pressCalc('7')">7</button>
            <button class="calc-btn" onclick="pressCalc('8')">8</button>
            <button class="calc-btn" onclick="pressCalc('9')">9</button>
            <button class="calc-btn op" onclick="pressCalc('*')">*</button>
            <button class="calc-btn" onclick="pressCalc('4')">4</button>
            <button class="calc-btn" onclick="pressCalc('5')">5</button>
            <button class="calc-btn" onclick="pressCalc('6')">6</button>
            <button class="calc-btn op" onclick="pressCalc('-')">-</button>
            <button class="calc-btn" onclick="pressCalc('1')">1</button>
            <button class="calc-btn" onclick="pressCalc('2')">2</button>
            <button class="calc-btn" onclick="pressCalc('3')">3</button>
            <button class="calc-btn op" onclick="pressCalc('+')">+</button>
            <button class="calc-btn" onclick="pressCalc('0')">0</button>
            <button class="calc-btn" onclick="pressCalc('.')">.</button>
            <button class="calc-btn op" onclick="pressCalc('%')">%</button>
            <button class="calc-btn op" style="background:#059669; color: white;" onclick="calculateCalc()">=</button>
        </div>
    </div>
<script>
    // --- DATABASE CASUALE EXAM STRUTTURATO AVANZATO (AAT COMPLIANT) ---
    const mockQuestionsDatabase = [
        {
            id: 1,
            type: "input",
            focus: "CHAPTER 1 FOCUS: NON-CURRENT ASSETS ADJUSTMENTS",
            instruction: "Calculate the second-year depreciation expense charge using the Reducing Balance framework.",
            question: "A business purchases a production vehicle on 1 January 2024 for £24,000. The firm applies the Reducing Balance Method of depreciation at a fixed rate of 25% per annum. Calculate the precise Depreciation Expense charge (£) to be recorded in the Statement of Profit or Loss for the second financial year ending 31 December 2025.",
            correct: "4500",
            rationale: "Year 1 (2024) Depreciation: £24,000 × 25% = £6,000. Net Book Value (NBV) at start of Year 2: £24,000 - £6,000 = £18,000. Year 2 (2025) Depreciation charge: £18,000 × 25% = £4,500."
        },
        {
            id: 2,
            type: "input",
            focus: "CHAPTER 1 FOCUS: YEAR-END OVERHEAD ADJUSTMENTS",
            instruction: "Calculate the exact Prepayment value required for the Statement of Financial Position.",
            question: "On 1 November 2025, an enterprise pays its annual commercial insurance premium of £3,600 covering a 12-month window to 31 October 2026. The full invoice was debited to the Insurance Expense account. Calculate the exact Prepayment adjustment amount (£) required at the financial year-end on 31 December 2025.",
            correct: "3000",
            rationale: "The premium covers 12 months, which equals £300 per month (£3,600 ÷ 12). At 31 December 2025, only 2 months (November and December) are consumed. The remaining 10 months (January to October 2026) are prepaid. Prepayment = 10 months × £300 = £3,000."
        },
        {
            id: 3,
            type: "input",
            focus: "CHAPTER 1 FOCUS: ACCRUAL ACCOUNTING OVERHEADS",
            instruction: "Isolate the unpaid consumed cost to form the year-end Accrual correction entry.",
            question: "A firm's financial year ends on 31 March 2026. The electricity bill is paid quarterly in arrears. The last invoice was settled up to 31 January 2026. On 15 May 2026, the firm receives an electricity bill of £900 covering February, March, and April 2026. Calculate the Accrual adjustment (£) required at year-end.",
            correct: "600",
            rationale: "The bill covers 3 months (Feb, Mar, Apr), making it £300 per month (£900 ÷ 3). At 31 March, the business has consumed electricity for February and March (2 months) but has not yet been invoiced. Accrual required = 2 months × £300 = £600."
        },
        {
            id: 4,
            type: "input",
            focus: "CHAPTER 2 FOCUS: VALUATION OF TRADE RECEIVABLES",
            instruction: "Execute specific write-offs before computing the updated general Allowance balance.",
            question: "At the end of the trading period, a business has total Trade Receivables of £45,000. The bookkeeper decides to fully write off an irrecoverable debt from client X worth £1,200, and subsequently adjust the general Allowance for Doubtful Debts to be exactly 5% of the remaining receivables pool. Calculate the final balance (£) of the adjusted Allowance account.",
            correct: "2190",
            rationale: "Step 1: Subtract the specific written-off debt from total receivables: £45,000 - £1,200 = £43,800. Step 2: Calculate the 5% general allowance on the updated pool: £43,800 × 5% = £2,190."
        },
        {
            id: 5,
            type: "radio",
            focus: "CHAPTER 2 FOCUS: ALLOWANCE FOR DOUBTFUL DEBTS LOGIC",
            instruction: "Identify the correct ledger posting path to record a decrease in the general allowance pool.",
            question: "When adjusting the general Allowance for Doubtful Debts account at year-end, it is discovered that the opening allowance balance is £1,800 and the newly required allowance is calculated as £1,450. What is the double-entry posting path to record this shift?",
            options: [
                "Debit Allowance for Doubtful Debts £350, Credit Irrecoverable Debts Expense £350",
                "Debit Irrecoverable Debts Expense £350, Credit Allowance for Doubtful Debts £350",
                "Debit Statement of Profit or Loss £1,450, Credit Allowance Account £1,450"
            ],
            correct: "Debit Allowance for Doubtful Debts £350, Credit Irrecoverable Debts Expense £350",
            rationale: "The allowance needs to decrease from £1,800 to £1,450, which is a reduction of £350. To reduce an allowance account (credit standard balance), we must Debit the Allowance account and Credit the Irrecoverable Debts Expense account (acting as an income credit adjustment)."
        },
        {
            id: 6,
            type: "radio",
            focus: "CHAPTER 3 FOCUS: DISPOSAL OF NON-CURRENT ASSETS",
            instruction: "Determine the final net profit or loss outcome on the disposal of machinery accounts.",
            question: "An item of machinery bought for £15,000 with accumulated depreciation of £9,000 is sold on credit during the period for £4,800. What is the final net profit or net loss outcome on this disposal transaction inside the accounts?",
            options: [
                "A Net Profit on Disposal of £1,200",
                "A Net Loss on Disposal of £1,200",
                "A Net Loss on Disposal of £6,000"
            ],
            correct: "A Net Loss on Disposal of £1,200",
            rationale: "Net Book Value (NBV) at disposal = Cost (£15,000) - Acc. Depreciation (£9,000) = £6,000. Disposal Proceeds = £4,800. Profit/Loss = Proceeds (£4,800) - NBV (£6,000) = -£1,200 (Net Loss on Disposal)."
        },
        {
            id: 7,
            type: "input",
            focus: "CHAPTER 3 FOCUS: PRO-RATA DEPRECIATION CALCULATIONS",
            instruction: "Compute the exact monthly pro-rata straight-line depreciation charge for a mid-year machine purchase.",
            question: "A business operates a policy of depreciating machinery at 20% per annum using the Straight-Line Method, calculated pro-rata on a monthly basis. A new cutting machine is purchased on 1 September 2025 for £18,000. Calculate the exact depreciation charge (£) for this machine for the financial year ending 31 December 2025.",
            correct: "1200",
            rationale: "Full annual depreciation: £18,000 × 20% = £3,600 per year. Monthly charge: £3,600 ÷ 12 = £300 per month. The machine was owned from 1 Sept to 31 Dec (September, October, November, December = 4 months). Pro-rata depreciation = 4 months × £300 = £1,200."
        },
        {
            id: 8,
            type: "radio",
            focus: "CHAPTER 4 FOCUS: EXTENDED TRIAL BALANCE (ETB) ROUTING",
            instruction: "Map the correct destination columns for year-end prepayment elements.",
            question: "Inside an Extended Trial Balance (ETB) worksheet, into which specific columns must the ending balance of a Prepayment adjustment be transferred?",
            options: [
                "Statement of Profit or Loss (Debit column)",
                "Statement of Financial Position (Debit column, representing a Current Asset)",
                "Statement of Financial Position (Credit column, representing a Current Liability)"
            ],
            correct: "Statement of Financial Position (Debit column, representing a Current Asset)",
            rationale: "A prepayment represents an expense paid in advance, which constitutes a Current Asset. Therefore, on an Extended Trial Balance, its final adjusted position must be mapped into the Statement of Financial Position Debit column."
        },
        {
            id: 9,
            type: "input",
            focus: "CHAPTER 5 FOCUS: PARTNERSHIP APPROPRIATION ACCOUNTS",
            instruction: "Calculate the residual profit allocation for individual partners following salary deductions.",
            question: "A partnership is formed between partner A and partner B. The partnership agreement states that partner A is entitled to an annual salary of £6,000. Residual profits are split in a 3:2 ratio respectively. The net profit for the year before adjustments is £26,000. Calculate partner B's definitive final share of residual profit (£).",
            correct: "8000",
            rationale: "Total Profit = £26,000. Deduct Partner A's Salary: £26,000 - £6,000 = £20,000 remaining as residual profit. Partner B's split is 2/5 of the residue (since the ratio is 3:2, total parts = 5). Partner B's Share = £20,000 × (2 ÷ 5) = £8,000."
        },
        {
            id: 10,
            type: "radio",
            focus: "CHAPTER 5 FOCUS: INTEREST ON PARTNER DRAWINGS",
            instruction: "Identify the internal accounting treatment of penalties charged on partner private drawings.",
            question: "Where should interest charged on partner drawings be entered inside the formal Partnership Appropriation Account?",
            options: [
                "As a Credit entry/Addition to the net profit because it represents an internal cost recovered from partners",
                "As a Debit entry/Deduction from the net profit because it increases individual partner current accounts",
                "Excluded entirely from the allocation map"
            ],
            correct: "As a Credit entry/Addition to the net profit because it represents an internal cost recovered from partners",
            rationale: "Interest on drawings is a penalty or charge levied by the partnership on individual partners for taking funds out. From the perspective of the partnership entity, it increases the total pool of profit available for appropriation, so it is credited/added to net profit."
        },
        {
            id: 11,
            type: "input",
            focus: "CHAPTER 4 FOCUS: IAS 2 INVENTORY VALUATION CRITERIA",
            instruction: "Apply the lower of Cost and Net Realizable Value (NRV) protocol to valuate inventory stocks.",
            question: "At year-end, the closing Inventory count valued at original cost is £14,500. However, investigation reveals that a batch of damaged items originally costing £1,500 can only be sold for £900 after spending £100 on repair modifications. Calculate the final accurate valuation of Inventory (£) under IAS 2.",
            correct: "13800",
            rationale: "IAS 2 states inventory must be valued at the lower of Cost and Net Realizable Value (NRV). For the sound stock: £14,500 - £1,500 = £13,000. For the damaged stock, NRV = Estimated Selling Price (£900) - Repair Costs (£100) = £800. Lower of cost (£1,500) and NRV (£800) is £800. Total inventory valuation = £13,000 + £800 = £13,800."
        },
        {
            id: 12,
            type: "radio",
            focus: "CHAPTER 4 FOCUS: ADJUSTMENTS DIRECT NET PROFIT DOMINO EFFECT",
            instruction: "Analyze the financial impact on net profit when reversing accruals and prepayments.",
            question: "If a bookkeeper accidentally records an Accrued Expense adjustment as a Prepayment on the year-end Extended Trial Balance, what is the combined structural impact on the calculated net profit?",
            options: [
                "Net Profit will be overstated",
                "Net Profit will be understated",
                "Net Profit will remain perfectly balanced"
            ],
            correct: "Net Profit will be overstated",
            rationale: "An accrual increases expenses (reducing profit). A prepayment reduces expenses (increasing profit). By reversing this, the business fails to record a cost and incorrectly removes another cost, causing the final calculated Net Profit to be significantly overstated."
        },
        {
            id: 13,
            type: "input",
            focus: "CHAPTER 3 FOCUS: SOFP CAPITAL STRUCTURE VALIDATION",
            instruction: "Execute the closing owner equity calculation base expansion.",
            question: "A sole trader has an opening Capital balance of £35,000. During the year, the business achieves a Net Profit of £12,400 and the owner executes total cash Drawings of £4,200. Calculate the closing Capital balance (£) to be shown on the Statement of Financial Position.",
            correct: "43200",
            rationale: "The accounting equation expansion dictates: Closing Capital = Opening Capital + Net Profit - Drawings. Closing Capital = £35,000 + £12,400 - £4,200 = £43,200."
        },
        {
            id: 14,
            type: "radio",
            focus: "CHAPTER 1 FOCUS: ELEMENT CLASSIFICATION PROTOCOLS",
            instruction: "Identify long-term strategic obligations inside financial report structures.",
            question: "Which of the following elements is classified as a Non-Current Liability on a corporate Statement of Financial Position?",
            options: [
                "Bank Overdraft facility on demand",
                "A 5-year bank loan balance",
                "Trade Payables ledger pool balance"
            ],
            correct: "A 5-year bank loan balance",
            rationale: "Bank overdrafts and trade payables are due for full settlement within 12 months, making them Current Liabilities. A 5-year loan is a long-term obligation stretching past one operating cycle, classifying it as a Non-Current Liability."
        },
        {
            id: 15,
            type: "input",
            focus: "CHAPTER 5 FOCUS: INTEREST ON FIXED CAPITAL POOLS",
            instruction: "Compute fixed internal financing allocations credited to individual partner channels.",
            question: "A partnership allows 5% per annum interest on capital allocations. Partner A has a fixed Capital account balance of £40,000. Calculate the interest on capital allocation (£) to be debited to the Partnership Appropriation Account for partner A.",
            correct: "2000",
            rationale: "Interest on Capital allocation = Partner's fixed Capital balance × Allocation interest rate. Allocation = £40,000 × 5% = £2,000."
        }
    ];

    let selectedQuestions = [];
    let currentTaskIndex = 1; // Gestore Indice Attivo Orizzontale (1-15)
    let examTimer = null;
    let secondsRemaining = 3600; 
    // --- FUNZIONE DI INIZIALIZZAZIONE RANDOMIZZATA ---
    window.addEventListener('DOMContentLoaded', () => {
        let shuffled = [...mockQuestionsDatabase].sort(() => 0.5 - Math.random());
        selectedQuestions = shuffled.slice(0, 15);
        
        generateTopTaskTabs();
        renderExamQuestions();
        startCountdownTimer();
        setupNavigationListeners();
        updateExamState();
    });

    // Genera dinamicamente la riga di bottoni superiori 'Task 1 10pt' ... 'Task 15 10pt'
    function generateTopTaskTabs() {
        const container = document.getElementById('tasks-buttons-container');
        container.innerHTML = '';
        
        selectedQuestions.forEach((_, index) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = `task-tab-btn ${index === 0 ? 'active' : ''}`;
            btn.setAttribute('data-target', index + 1);
            btn.innerHTML = `Task ${index + 1} <span style="display:block; font-size:9px; font-weight:normal; opacity:0.7; margin-top:2px;">10pt</span>`;
            
            btn.addEventListener('click', () => {
                currentTaskIndex = index + 1;
                updateExamState();
            });
            container.appendChild(btn);
        });
    }

    function renderExamQuestions() {
        const placeholder = document.getElementById('dynamic-questions-placeholder');
        placeholder.innerHTML = '';

        selectedQuestions.forEach((q, index) => {
            const panel = document.createElement('div');
            panel.className = `task-panel ${index === 0 ? 'active' : ''}`;
            panel.setAttribute('data-panel-index', index + 1);
            
            let htmlContent = `
                <div class="focus-header">${q.focus}</div>
                <div class="focus-instruction">${q.instruction}</div>
                <p class="task-question-text">${q.question}</p>
            `;

            if (q.type === 'radio') {
                htmlContent += `<div class="options-container">`;
                q.options.forEach(opt => {
                    htmlContent += `
                        <label class="option-box-row">
                            <input type="radio" name="mock_q_${q.id}" value="${opt}">
                            <span class="option-text-label">${opt}</span>
                        </label>
                    `;
                });
                htmlContent += `</div>`;
            } else if (q.type === 'input') {
                htmlContent += `
                    <div class="input-box-row">
                        <span>Calculated Balance (£):</span>
                        <input type="text" class="numeric-field" name="mock_q_${q.id}" placeholder="0">
                    </div>
                `;
            }

            panel.innerHTML = htmlContent;
            placeholder.appendChild(panel);
        });
    }

    function startCountdownTimer() {
        examTimer = setInterval(() => {
            if (secondsRemaining <= 0) {
                clearInterval(examTimer);
                document.getElementById('time-display').innerText = "00:00";
                alert("Time expired! Your exam will be submitted automatically.");
                processExamSubmission();
            } else {
                secondsRemaining--;
                let mins = Math.floor(secondsRemaining / 60);
                let secs = secondsRemaining % 60;
                document.getElementById('time-display').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }
    function setupNavigationListeners() {
        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentTaskIndex < 15) { currentTaskIndex++; updateExamState(); }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentTaskIndex > 1) { currentTaskIndex--; updateExamState(); }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            const activePanel = document.querySelector(`.task-panel[data-panel-index="${currentTaskIndex}"]`);
            if (activePanel) {
                const radio = activePanel.querySelector('input[type="radio"]:checked');
                if (radio) radio.checked = false;
                const field = activePanel.querySelector('.numeric-field');
                if (field) field.value = '';
            }
        });
    }

    function updateExamState() {
        // Sincronizza i pannelli delle domande
        document.querySelectorAll('.task-panel').forEach(p => {
            p.classList.remove('active');
            if (parseInt(p.getAttribute('data-panel-index')) === currentTaskIndex) p.classList.add('active');
        });

        // Sincronizza i bottoni orizzontali superiori
        document.querySelectorAll('.task-tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if (parseInt(btn.getAttribute('data-target')) === currentTaskIndex) {
                btn.classList.add('active');
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        });

        document.getElementById('btn-prev').disabled = (currentTaskIndex === 1);
        document.getElementById('btn-next').disabled = (currentTaskIndex === 15);
    }

    function processExamSubmission() {
        if (!confirm("Are you sure you want to submit your assessment? This will finalize your grade.")) return;
        
        clearInterval(examTimer);
        
        // Disattiva e nasconde l'intera barra dei controlli inferiori
        document.querySelector('.assessment-footer').style.display = 'none';
        
        // Sblocca e mostra a cascata tutti i pannelli dei task per una comoda revisione verticale
        document.querySelectorAll('.task-panel').forEach(p => p.classList.add('active'));
        document.getElementById('tasks-buttons-container').style.display = 'none';

        let scorePoints = 0;
        const form = document.getElementById('mock-assessment-form');
        const rationalesContainer = document.getElementById('rationales-placeholder');
        rationalesContainer.innerHTML = '';

        selectedQuestions.forEach((q, index) => {
            let studentInput = "";
            if (q.type === 'radio') {
                const picked = form.querySelector(`input[name="mock_q_${q.id}"]:checked`);
                if (picked) studentInput = picked.value;
            } else if (q.type === 'input') {
                const field = form.querySelector(`input[name="mock_q_${q.id}"]`);
                if (field) studentInput = field.value.trim();
            }

            const isMatched = studentInput === q.correct;
            if (isMatched) scorePoints++;

            const block = document.createElement('div');
            block.className = 'explanation-box';
            block.innerHTML = `
                <p style="font-weight:700; color:#0F172A; font-size:14px;">Task ${index + 1}: ${isMatched ? '<span style="color:#059669;">✔️ Correct</span>' : '<span style="color:#DC2626;">❌ Incorrect</span>'}</p>
                <p style="font-size:13px; color:#475569; margin: 4px 0;"><strong>Your Input:</strong> ${studentInput || '[Blank]'} | <strong>Correct Key:</strong> ${q.correct}</p>
                <p style="font-size:13px; color:#334155; background:#F8FAFC; padding:12px; border-radius:4px; border-left:3px solid #0284C7; margin-top:6px; font-style:normal;"><strong>Audit Trail Rationale:</strong> ${q.rationale}</p>
            `;
            rationalesContainer.appendChild(block);
        });

        let successPercentage = Math.round((scorePoints / 15) * 100);
        document.getElementById('percentage-score').innerText = `${successPercentage}%`;
        
        const feedbackText = document.getElementById('pass-fail-feedback');
        if (successPercentage >= 70) {
            feedbackText.innerText = "🎉 PASS! Competence effectively demonstrated under formal conditions.";
            feedbackText.style.color = "#059669";
        } else {
            feedbackText.innerText = "❌ REFER. Unresolved variances located. Please analyze the audit log below before restarting.";
            feedbackText.style.color = "#DC2626";
        }

        document.getElementById('results-panel').style.display = 'block';
        window.scrollTo({ top: document.getElementById('results-panel').offsetTop - 60, behavior: 'smooth' });
    }

    // --- MANIPOLAZIONE CALCOLATRICE ORIGINAL NATIVE ---
    const calcWidget = document.getElementById('calc-widget');
    const topTrigger = document.getElementById('top-calc-trigger');
    const calcClose = document.getElementById('calc-close-btn');

    if(topTrigger && calcWidget && calcClose) {
        topTrigger.addEventListener('click', () => calcWidget.style.display = 'block');
        calcClose.addEventListener('click', () => calcWidget.style.display = 'none');
    }

    let calcDisplay = document.getElementById('calc-screen');
    function pressCalc(val) {
        if (calcDisplay.innerText === '0' && !isNaN(val)) calcDisplay.innerText = '';
        if (val === 'sq') { calcDisplay.innerText = Math.pow(eval(calcDisplay.innerText), 2); }
        else if (val === 'rt') { calcDisplay.innerText = Math.sqrt(eval(calcDisplay.innerText)); }
        else { calcDisplay.innerText += val; }
    }
    function clearCalc() { calcDisplay.innerText = '0'; }
    function calculateCalc() { try { calcDisplay.innerText = eval(calcDisplay.innerText); } catch(e) { calcDisplay.innerText = 'Error'; } }

    let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
    if(calcWidget) {
        calcWidget.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('calc-btn') || e.target.id === 'calc-screen') return;
            initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; isDragging = true;
        });
        document.addEventListener('mouseup', () => { isDragging = false; initialX = currentX; initialY = currentY; });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return; e.preventDefault();
            currentX = e.clientX - initialX; currentY = e.clientY - initialY;
            xOffset = currentX; yOffset = currentY;
            calcWidget.style.transform = `translate(${currentX}px, ${currentY}px)`;
        });
    }
</script>
</body>
</html>
