<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Accounting Hub | Home</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --card-glass: rgba(16, 24, 48, 0.75);
            --border-glass: rgba(0, 242, 254, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #00f2fe;
            --secondary: #4facfe;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }
        h1 {
            color: transparent;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            font-size: 2.6rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .hub-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: #0a0f1d;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }
        .hub-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .btn-alt {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
        }
        .btn-alt:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>AAT Accounting Hub</h1>
            <p class="subtitle">UK Accounting Examination Preparation Platform</p>
            
            <div class="btn-group">
                <a href="studio.html" class="hub-btn">📚 Open Study Hub Indice</a>
                <a href="simulatore.html" class="hub-btn btn-alt">🧮 Launch Exam Simulator</a>
            </div>
        </div>
    </div>
</body>
</html>
