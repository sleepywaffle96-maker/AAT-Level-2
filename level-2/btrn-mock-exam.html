<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT L2 - BTRN Mock Exam</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Il CSS del Blocco 2 andrà qui -->
</head>
<body>

    <!-- BARRA TIMER FISSA -->
    <div class="exam-top-bar">
        <div style="font-weight:700; color:#FFF;">BTRN PRACTICE ASSESSMENT</div>
        <div class="timer-container">
            <button class="tool-btn" onclick="toggleCalc()">🧮 Calculator</button>
            <div id="exam-timer" class="timer-countdown">60:00</div>
        </div>
    </div>

    <!-- BOLLA BIANCA CENTRALE -->
    <main class="exam-main-wrapper">
        <div class="white-bubble-container">
            
            <!-- SCHEDE TASK -->
            <div class="exam-tabs-navigation" id="exam-tabs-headers"></div>

            <!-- CONTENITORE DOMANDE -->
            <form id="mock-exam-form">
                <div id="exam-panels-container"></div>
            </form>

            <!-- PULSANTI DI CONTROLLO -->
            <div class="exam-footer-controls">
                <div>
                    <button class="ctrl-btn btn-secondary" id="btn-prev" onclick="navPrev()">⬅️ Prev</button>
                    <button class="ctrl-btn btn-secondary" id="btn-next" onclick="navNext()">Next ➡️</button>
                </div>
                <div>
                    <button class="ctrl-btn btn-danger" onclick="resetExam()">🔄 Reset</button>
                    <button class="ctrl-btn btn-success" onclick="submitExam()">🏆 Submit</button>
                </div>
            </div>

            <!-- TABELLA RISULTATI (NASCURA) -->
            <div class="exam-results-card hidden" id="results-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                    <h2>Exam Report</h2>
                    <button class="ctrl-btn btn-secondary" onclick="window.print()">📄 PDF (A4)</button>
                </div>
                <div class="results-grid">
                    <div class="result-metric">Score: <strong id="res-score">0%</strong></div>
                    <div class="result-metric">Points: <strong id="res-points">0/40</strong></div>
                </div>
            </div>

        </div>
    </main>

    <!-- CALCOLATRICE DRAG NEON -->
    <div class="drag-calculator-panel" id="neon-calc">
        <div class="calc-header" id="calc-header">AAT Calc <span onclick="toggleCalc()" style="cursor:pointer;">×</span></div>
        <input type="text" id="calc-display" class="calc-display-input" readonly value="0">
        <div class="calc-grid-buttons">
            <button class="calc-btn" onclick="clearCalc()">C</button>
            <button class="calc-btn" onclick="pressOp('/')">/</button>
            <button class="calc-btn" onclick="pressOp('*')">*</button>
            <button class="calc-btn" onclick="pressOp('-')">-</button>
            <button class="calc-btn" onclick="pressNum('7')">7</button>
            <button class="calc-btn" onclick="pressNum('8')">8</button>
            <button class="calc-btn" onclick="pressNum('9')">9</button>
            <button class="calc-btn" onclick="pressOp('+')">+</button>
            <button class="calc-btn" onclick="pressNum('4')">4</button>
            <button class="calc-btn" onclick="pressNum('5')">5</button>
            <button class="calc-btn" onclick="pressNum('6')">6</button>
            <button class="calc-btn btn-equal" onclick="calcResult()">=</button>
            <button class="calc-btn" onclick="pressNum('1')">1</button>
            <button class="calc-btn" onclick="pressNum('2')">2</button>
            <button class="calc-btn" onclick="pressNum('3')">3</button>
            <button class="calc-btn" onclick="pressNum('0')">0</button>
        </div>
    </div>

    <!-- I Blocchi JS andranno qui vicino alla chiusura del body -->
</body>
</html>
<style>
    /* STILE GLOBALE (SFONDO SCURO) */
    body {
        font-family: 'Inter', sans-serif;
        background-color: #0B0F19;
        margin: 0;
        padding-top: 70px;
        color: #1F2937;
    }

    /* BARRA FISSA SUPERIORE */
    .exam-top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background-color: #111827;
        border-bottom: 2px solid #059669;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        box-sizing: border-box;
        z-index: 1000;
    }

    .timer-container {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .timer-countdown {
        font-family: 'JetBrains Mono', monospace;
        color: #FFFFFF;
        font-weight: 700;
        background: #1F2937;
        padding: 0.4rem 0.8rem;
        border-radius: 4px;
    }

    /* LA BOLLA BIANCA PROTETTA */
    .exam-main-wrapper {
        max-width: 900px;
        margin: 1.5rem auto;
        padding: 0 1rem;
    }

    .white-bubble-container {
        background-color: #FFFFFF;
        border-radius: 8px;
        padding: 1.5rem;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* STRUTTURA SCHEDE (TABS) */
    .exam-tabs-navigation {
        display: flex;
        gap: 0.25rem;
        border-bottom: 2px solid #E5E7EB;
        margin-bottom: 1.5rem;
    }

    .tab-trigger-btn {
        background: #F3F4F6;
        border: 1px solid #E5E7EB;
        border-bottom: none;
        padding: 0.5rem 1rem;
        font-weight: 600;
        color: #4B5563;
        cursor: pointer;
        border-top-left-radius: 4px;
        border-top-right-radius: 4px;
    }

    .tab-trigger-btn.active {
        background: #FFFFFF;
        color: #059669;
        border-top: 3px solid #059669;
        margin-bottom: -2px;
    }

    /* STRUTTURA DOMANDE POLIMORFE */
    .exam-task-panel { display: none; }
    .exam-task-panel.active { display: block; }

    .task-interactive-body {
        background-color: #FAFAFA;
        border: 1px solid #E5E7EB;
        border-radius: 6px;
        padding: 1rem;
        margin: 1rem 0;
    }

    /* CAMPI TABELLE E MATRICI */
    .financial-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.5rem;
    }

    .financial-table th {
        background-color: #047857;
        color: #FFFFFF;
        padding: 0.5rem;
        font-size: 0.85rem;
    }

    .financial-table td {
        border: 1px solid #E5E7EB;
        padding: 0.4rem;
        text-align: right;
    }

    .table-input {
        width: 100%;
        padding: 0.3rem;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        text-align: right;
        font-family: 'JetBrains Mono', monospace;
    }

    /* PULSANTI DI CONTROLLO */
    .exam-footer-controls {
        display: flex;
        justify-content: space-between;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #E5E7EB;
    }

    .ctrl-btn {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        border: none;
    }

    .btn-secondary { background: #E5E7EB; color: #1F2937; }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { background: #DC2626; color: #FFFFFF; }
    .btn-success { background: #059669; color: #FFFFFF; }
    .tool-btn { background: #374151; color: #FFF; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; }

    /* WIDGET CALCOLATRICE NEON */
    .drag-calculator-panel {
        position: fixed;
        top: 80px;
        right: 20px;
        width: 220px;
        background: #111827;
        border: 2px solid #00FF66;
        padding: 0.5rem;
        border-radius: 6px;
        display: none;
        z-index: 2000;
    }

    .calc-header { color: #00FF66; font-size: 0.8rem; display: flex; justify-content: space-between; margin-bottom: 0.4rem; }
    .calc-display-input { width: 100%; background: #000; color: #00FF66; border: none; text-align: right; padding: 0.3rem; font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; }
    .calc-grid-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.3rem; margin-top: 0.4rem; }
    .calc-btn { background: #374151; color: #FFF; border: none; padding: 0.4rem; cursor: pointer; font-weight: bold; }
    .btn-equal { background: #00FF66; color: #000; grid-row: span 2; }

    /* REPORT E UTILITY */
    .exam-results-card { background: #F9FAFB; border: 2px solid #059669; border-radius: 6px; padding: 1rem; margin-top: 1.5rem; }
    .hidden { display: none !important; }

    /* SUPPORTO STAMPA A4 PULITA */
    @media print {
        body { background: #FFF !important; padding-top: 0; }
        .exam-top-bar, .exam-tabs-navigation, .exam-footer-controls, .drag-calculator-panel { display: none !important; }
        .exam-task-panel { display: block !important; page-break-after: always; }
        .exam-results-card { display: block !important; page-break-before: always; }
    }
</style>
<script>
// 1. DATABASE DEI QUESITI
const questionsDatabase = [
    {
        id: 1,
        chapter: 1,
        type: "radio",
        points: 10,
        instruction: "Identify the correct definition of a liability from the options below.",
        content: `
            <div style="margin-bottom:0.5rem;">Which of the following describes an accounting <strong>Liability</strong>?</div>
            <div style="display:flex; flex-direction:column; gap:0.4rem;">
                <label><input type="radio" name="q1" value="A"> A present obligation arising from past events, resulting in an outflow of economic benefits.</label>
                <label><input type="radio" name="q1" value="B"> A resource controlled by the entity as a result of past events from which benefits are expected.</label>
                <label><input type="radio" name="q1" value="C"> The residual interest in the assets of the entity after deducting all its liabilities.</label>
            </div>
        `,
        correct: "A",
        explanation: "A liability represents an obligation resulting in an outflow of resources. Option B defines an asset; Option C defines equity."
    },
    {
        id: 2,
        chapter: 2,
        type: "multi-input",
        points: 15,
        instruction: "Calculate and fill the missing cells for this Credit Invoice entry.",
        content: `
            <div style="margin-bottom:0.5rem;">An invoice shows Goods Net of £400.00. Calculate the VAT (20%) and Total Gross.</div>
            <table class="financial-table">
                <thead><tr><th>Goods Net (£)</th><th>VAT (20%) (£)</th><th>Total Gross (£)</th></tr></thead>
                <tbody><tr><td>400.00</td><td><input type="text" class="table-input" data-ans="80.00" placeholder="0.00"></td><td><input type="text" class="table-input" data-ans="480.00" placeholder="0.00"></td></tr></tbody>
            </table>
        `,
        explanation: "VAT is £400.00 * 20% = £80.00. Total Gross is Net + VAT = £480.00."
    },
    {
        id: 3,
        chapter: 3,
        type: "input",
        points: 15,
        instruction: "Calculate the total cash reimbursement required under the imprest system.",
        content: `
            <div style="margin-bottom:0.5rem;">A petty cash float is fixed at £200.00. Vouchers paid: Stationery £15.00, Taxi £12.50. Enter top-up needed.</div>
            <div style="display:flex; align-items:center; max-width:150px; border:1px solid #E5E7EB; border-radius:4px;">
                <span style="padding:0.3rem 0.5rem; background:#E5E7EB; font-weight:bold;">£</span>
                <input type="text" class="table-input" id="q3_ans" data-ans="27.50" placeholder="0.00" style="border:none;">
            </div>
        `,
        explanation: "Under the imprest system, the top-up must match the total cash spent: £15.00 + £12.50 = £27.50."
    }
];

// 2. STATO GLOBALE
let examQuestions = []; 
let currentTabActive = 0;
let timeRemainingSeconds = 3600;
let examTimerInterval = null;
let isExamSubmitted = false;

window.addEventListener('DOMContentLoaded', () => {
    initExamEngine();
});

// 3. MOTORE DI RENDERING
function initExamEngine() {
    examQuestions = [...questionsDatabase].sort(() => Math.random() - 0.5);
    generateExamTabs();
    generateExamPanels();
    activateTab(0);
    startExamTimer();
}

function generateExamTabs() {
    const container = document.getElementById('exam-tabs-headers');
    if (!container) return;
    container.innerHTML = '';
    examQuestions.forEach((q, index) => {
        container.innerHTML += `<button type="button" class="tab-trigger-btn" id="tab-trigger-${index}" onclick="activateTab(${index})">Task ${index + 1} <span style="font-size:0.7rem; background:#E5E7EB; padding:1px 3px; border-radius:2px;">${q.points}pt</span></button>`;
    });
}

function generateExamPanels() {
    const container = document.getElementById('exam-panels-container');
    if (!container) return;
    container.innerHTML = '';
    examQuestions.forEach((q, index) => {
        container.innerHTML += `
            <div class="exam-task-panel" id="task-panel-${index}">
                <div style="font-size:0.75rem; color:#6B7280; font-weight:600; margin-bottom:0.25rem;">CHAPTER ${q.chapter} Focus</div>
                <div style="font-weight:600; margin-bottom:0.75rem;">${q.instruction}</div>
                <div class="task-interactive-body">${q.content}</div>
                <div class="exam-results-card hidden" id="feedback-panel-${index}">
                    <div id="feedback-title-${index}" style="font-weight:700; margin-bottom:0.25rem;"></div>
                    <div style="font-size:0.85rem; color:#4B5563; padding-top:0.4rem; border-top:1px dashed #E5E7EB;"><strong>Solution:</strong> ${q.explanation}</div>
                </div>
            </div>`;
    });
}

function activateTab(index) {
    if (index < 0 || index >= examQuestions.length) return;
    document.querySelectorAll('.tab-trigger-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.exam-task-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-trigger-${index}`).classList.add('active');
    document.getElementById(`task-panel-${index}`).classList.add('active');
    currentTabActive = index;
    document.getElementById('btn-prev').disabled = (index === 0);
    document.getElementById('btn-next').disabled = (index === examQuestions.length - 1);
}

function navPrev() { if (currentTabActive > 0) activateTab(currentTabActive - 1); }
function navNext() { if (currentTabActive < examQuestions.length - 1) activateTab(currentTabActive + 1); }

// 4. LOGICA DI VALUTAZIONE
function submitExam() {
    if (isExamSubmitted) return;
    clearInterval(examTimerInterval);
    isExamSubmitted = true;
    let available = 0, awarded = 0;

    examQuestions.forEach((q, index) => {
        const panel = document.getElementById(`task-panel-${index}`);
        const feedbackBox = document.getElementById(`feedback-panel-${index}`);
        const feedbackTitle = document.getElementById(`feedback-title-${index}`);
        available += q.points;
        let isCorrect = true;

        if (q.type === "radio") {
            const sel = panel.querySelector(`input[name="q${q.id}"]:checked`);
            isCorrect = (sel && sel.value === q.correct);
        } else {
            panel.querySelectorAll('input[data-ans]').forEach(i => {
                if (i.value.trim().toLowerCase() !== i.getAttribute('data-ans').trim().toLowerCase()) {
                    isCorrect = false;
                    i.style.borderColor = "#DC2626";
                } else {
                    i.style.borderColor = "#059669";
                }
            });
        }

        if (isCorrect) {
            awarded += q.points;
            feedbackBox.style.backgroundColor = "#DEF7EC";
            feedbackTitle.innerHTML = `✅ Correct! (+${q.points} Pts)`;
            feedbackTitle.style.color = "#065F46";
        } else {
            feedbackBox.style.backgroundColor = "#FDE8E8";
            feedbackTitle.innerHTML = `❌ Incorrect! (0 / ${q.points} Pts)`;
            feedbackTitle.style.color = "#9B1C1C";
        }
        feedbackBox.classList.remove('hidden');
    });

    const score = available > 0 ? Math.round((awarded / available) * 100) : 0;
    document.getElementById('res-score').textContent = `${score}%`;
    document.getElementById('res-points').textContent = `${awarded} / ${available}`;
    document.getElementById('results-card').classList.remove('hidden');
}

function resetExam() {
    if (confirm("Reset current exam session?")) {
        clearInterval(examTimerInterval);
        isExamSubmitted = false;
        timeRemainingSeconds = 3600;
        document.getElementById('exam-timer').style.color = "#FFFFFF";
        document.getElementById('results-card').classList.add('hidden');
        initExamEngine();
    }
}

// 5. TIMER & CALCOLATRICE
function startExamTimer() {
    const display = document.getElementById('exam-timer');
    examTimerInterval = setInterval(() => {
        if (timeRemainingSeconds <= 0) {
            clearInterval(examTimerInterval);
            submitExam();
        } else {
            timeRemainingSeconds--;
            let min = Math.floor(timeRemainingSeconds / 60), sec = timeRemainingSeconds % 60;
            display.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            if (timeRemainingSeconds < 300) display.style.color = "#DC2626";
        }
    }, 1000);
}

function toggleCalc() {
    const c = document.getElementById('neon-calc');
    c.style.display = (c.style.display === 'block') ? 'none' : 'block';
}
function pressNum(n) {
    const d = document.getElementById('calc-display');
    d.value = (d.value === '0') ? n : d.value + n;
}
function pressOp(o) { document.getElementById('calc-display').value += o; }
function clearCalc() { document.getElementById('calc-display').value = '0'; }
function calcResult() {
    const d = document.getElementById('calc-display');
    try { d.value = eval(d.value); } catch(e) { d.value = 'Error'; }
}
</script>
</body>
</html>
