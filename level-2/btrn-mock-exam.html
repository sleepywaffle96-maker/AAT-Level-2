<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAT Level 2 BTRN - Official Style Mock Exam</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* ========================================== */
        /* DESIGN SYSTEM & CORE INTERFACCIA ASSESSMENT */
        /* ========================================== */
        :root {
            --bg-dark-external: #0B0F19;
            --bubble-white-bg: #FFFFFF;
            --l2-emerald-primary: #059669;
            --l2-emerald-dark: #047857;
            --l2-emerald-light: #E6F4EA;
            --text-dark: #1F2937;
            --text-muted: #4B5563;
            --border-color: #E5E7EB;
            --danger-color: #DC2626;
            --success-box-bg: #DEF7EC;
            --neon-calc-accent: #00FF66;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark-external);
            color: var(--text-dark);
            margin: 0;
            padding-top: 80px;
        }

        .exam-top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: #111827;
            border-bottom: 2px solid var(--l2-emerald-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            box-sizing: border-box;
            z-index: 1000;
        }

        .top-bar-title {
            color: #FFFFFF;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .timer-countdown {
            font-family: 'JetBrains Mono', monospace;
            color: #FFFFFF;
            font-weight: 700;
            background: #1F2937;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 1.1rem;
            border: 1px solid #374151;
        }

        .exam-main-wrapper {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .white-bubble-container {
            background-color: var(--bubble-white-bg);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
        }

        .exam-tabs-navigation {
            display: flex;
            gap: 0.35rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 1px;
        }

        .tab-trigger-btn {
            background: #F3F4F6;
            border: 1px solid var(--border-color);
            border-bottom: none;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        .tab-trigger-btn:hover { background: #E5E7EB; }
        .tab-trigger-btn.active {
            background: var(--bubble-white-bg);
            color: var(--l2-emerald-primary);
            border-top: 3px solid var(--l2-emerald-primary);
            padding-bottom: calc(0.6rem + 2px);
            margin-bottom: -2px;
        }

        .exam-task-panel { display: none; }
        .exam-task-panel.active { display: block; }

        .task-interactive-body {
            background-color: #FAFAFA;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .financial-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: #FFFFFF;
        }

        .financial-table th {
            background-color: var(--l2-emerald-dark);
            color: #FFFFFF;
            padding: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--l2-emerald-dark);
        }

        .financial-table td {
            border: 1px solid var(--border-color);
            padding: 0.6rem;
            font-size: 0.9rem;
        }

        .table-input {
            width: 100%;
            padding: 0.4rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .text-right { text-align: right; }
        .text-left { text-align: left; }

        .option-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .exam-footer-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--border-color);
        }

        .ctrl-btn {
            padding: 0.65rem 1.25rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }

        .btn-secondary { background: #E5E7EB; color: var(--text-dark); }
        .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-danger { background: var(--danger-color); color: #FFFFFF; }
        .btn-success { background: var(--l2-emerald-primary); color: #FFFFFF; }
        .tool-btn { background: #374151; color: #FFF; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }

        .exam-results-card {
            margin-top: 2rem;
            background: #F9FAFB;
            border: 2px solid var(--l2-emerald-primary);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .result-metric {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            padding: 1.2rem;
            border-radius: 6px;
            text-align: center;
        }

        .metric-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .metric-value { font-size: 1.4rem; font-weight: 700; color: var(--l2-emerald-dark); }

        .drag-calculator-panel {
            position: fixed;
            top: 85px;
            right: 30px;
            width: 240px;
            background: #111827;
            border: 2px solid var(--neon-calc-accent);
            border-radius: 8px;
            display: none;
            z-index: 2000;
        }

        .calc-header {
            background: #1F2937;
            padding: 0.5rem;
            color: var(--neon-calc-accent);
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #374151;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
        }

        .calc-display-input {
            width: 100%;
            background: #000000;
            color: var(--neon-calc-accent);
            border: 1px solid #374151;
            text-align: right;
            padding: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .calc-grid-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; margin-top: 0.5rem; }
        .calc-btn { background: #374151; color: #FFFFFF; border: none; padding: 0.55rem; cursor: pointer; font-weight: 700; border-radius: 4px; }
        .btn-equal { background: var(--neon-calc-accent); color: #000000; grid-row: span 2; display: flex; align-items: center; justify-content: center; }
        
        .feedback-box {
            margin-top: 1.2rem;
            padding: 1.2rem;
            border-radius: 6px;
            border-left: 4px solid;
        }
        
        .hidden { display: none !important; }

        @media print {
            body { background: #FFFFFF !important; padding-top: 0 !important; color: #000000 !important; }
            .exam-top-bar, .exam-tabs-navigation, .exam-footer-controls, .drag-calculator-panel { display: none !important; }
            .exam-main-wrapper { margin: 0 !important; padding: 0 !important; max-width: 100% !important; }
            .white-bubble-container { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .exam-task-panel { display: block !important; page-break-after: always; }
            .task-interactive-body { background: #FFFFFF !important; border: 1px solid #000000 !important; }
            .exam-results-card { display: block !important; border: 2px solid #000000 !important; background: #FFFFFF !important; page-break-before: always; }
            input { border: none !important; border-bottom: 1px solid #000000 !important; background: transparent !important; }
        }
    </style>
</head>
<body>

    <!-- BARRA FISSA SUPERIORE -->
    <div class="exam-top-bar">
        <div class="top-bar-title">🏆 AAT LEVEL 2: BTRN LIVE ASSESSMENT</div>
        <div class="timer-container">
            <button type="button" class="tool-btn" onclick="toggleCalc()">🧮 Calculator</button>
            <div id="exam-timer" class="timer-countdown">60:00</div>
        </div>
    </div>

    <!-- BOLLA BIANCA CENTRALE -->
    <main class="exam-main-wrapper">
        <div class="white-bubble-container">
            
            <!-- SCHEDE TASK -->
            <div class="exam-tabs-navigation" id="exam-tabs-headers"></div>

            <!-- CONTENITORE DOMANDE -->
            <form id="mock-exam-form" onsubmit="event.preventDefault();">
                <div id="exam-panels-container"></div>
            </form>

            <!-- PULSANTI DI CONTROLLO -->
            <div class="exam-footer-controls">
                <div>
                    <button type="button" class="ctrl-btn btn-secondary" id="btn-prev" onclick="navPrev()">⬅️ Previous</button>
                    <button type="button" class="ctrl-btn btn-secondary" id="btn-next" onclick="navNext()">Next ➡️</button>
                </div>
                <div>
                    <button type="button" class="ctrl-btn btn-danger" onclick="resetExam()">🔄 Reset</button>
                    <button type="button" class="ctrl-btn btn-success" onclick="submitExam()">🏆 Submit</button>
                </div>
            </div>

            <!-- TABELLA RISULTATI (NASCROSTA DI DEFAULT) -->
            <div class="exam-results-card hidden" id="results-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:2px solid #E5E7EB; padding-bottom:0.5rem;">
                    <h2 style="color:#111827; margin:0; font-size:1.3rem;">Official Performance Report</h2>
                    <button type="button" class="ctrl-btn btn-secondary" onclick="window.print()">📄 Download as PDF (A4 Print)</button>
                </div>
                <div class="results-grid">
                    <div class="result-metric">
                        <span class="metric-label">Final Grade</span>
                        <span class="metric-value" id="res-score">0%</span>
                    </div>
                    <div class="result-metric">
                        <span class="metric-label">Points Awarded</span>
                        <span class="metric-value" id="res-points">0 / 100</span>
                    </div>
                    <div class="result-metric">
                        <span class="metric-label">Outcome</span>
                        <span class="metric-value" id="res-outcome">-</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- WIDGET CALCOLATRICE NEON POP-UP -->
    <div class="drag-calculator-panel" id="neon-calc">
        <div class="calc-header" id="calc-header">AAT SYSTEM CALCULATOR <span onclick="toggleCalc()" style="cursor:pointer; font-size:1.2rem;">×</span></div>
        <div style="padding:0.6rem;">
            <input type="text" id="calc-display" class="calc-display-input" readonly value="0">
            <div class="calc-grid-buttons">
                <button type="button" class="calc-btn" style="color:#F87171;" onclick="clearCalc()">C</button>
                <button type="button" class="calc-btn" style="color:#00FF66;" onclick="pressOp('/')">/</button>
                <button type="button" class="calc-btn" style="color:#00FF66;" onclick="pressOp('*')">*</button>
                <button type="button" class="calc-btn" style="color:#00FF66;" onclick="pressOp('-')">-</button>
                <button type="button" class="calc-btn" onclick="pressNum('7')">7</button>
                <button type="button" class="calc-btn" onclick="pressNum('8')">8</button>
                <button type="button" class="calc-btn" onclick="pressNum('9')">9</button>
                <button type="button" class="calc-btn" style="color:#00FF66;" onclick="pressOp('+')">+</button>
                <button type="button" class="calc-btn" onclick="pressNum('4')">4</button>
                <button type="button" class="calc-btn" onclick="pressNum('5')">5</button>
                <button type="button" class="calc-btn" onclick="pressNum('6')">6</button>
                <button type="button" class="calc-btn btn-equal" onclick="calcResult()">=</button>
                <button type="button" class="calc-btn" onclick="pressNum('1')">1</button>
                <button type="button" class="calc-btn" onclick="pressNum('2')">2</button>
                <button type="button" class="calc-btn" onclick="pressNum('3')">3</button>
                <button type="button" class="calc-btn" style="grid-column: span 2;" onclick="pressNum('0')">0</button>
                <button type="button" class="calc-btn" onclick="pressNum('.')">.</button>
            </div>
        </div>
    </div>
<script>
const questionsDatabase = [
    {
        id: 1, chapter: 1, type: "radio", points: 10,
        instruction: "Identify the correct regulatory definitions and accounting frameworks.",
        content: `
            <div style="margin-bottom:0.5rem;">Which of the following choices correctly defines a <strong>Liability</strong> according to the AAT syllabus?</div>
            <div class="options-container">
                <label class="option-label"><input type="radio" name="q1" value="A"> A present obligation of the entity arising from past events, resulting in an outflow of economic benefits.</label>
                <label class="option-label"><input type="radio" name="q1" value="B"> A resource controlled by the entity as a result of past events from which future benefits flow.</label>
                <label class="option-label"><input type="radio" name="q1" value="C"> The residual interest in the assets of the entity after deducting all its liabilities.</label>
            </div>
        `, correct: "A",
        explanation: "According to the AAT syllabus and IASB framework, a liability represents a present obligation from past events resulting in an outflow of economic resources. Option B defines an asset, Option C defines equity."
    },
    {
        id: 2, chapter: 2, type: "multi-input", points: 10,
        instruction: "Process financial documents and cast the columns of the Sales Day Book.",
        content: `
            <div style="margin-bottom:0.5rem;">Calculate the missing VAT (20%) and Total Gross amounts for each credit invoice transaction, then perform the final vertical casting.</div>
            <table class="financial-table">
                <thead><tr><th class="text-left">Customer</th><th>Goods Net (£)</th><th>VAT (20%) (£)</th><th>Total Gross (£)</th></tr></thead>
                <tbody>
                    <tr><td class="text-left">Alpha Traders</td><td>450.00</td><td><input type="text" class="table-input text-right" data-ans="90.00" placeholder="0.00"></td><td><input type="text" class="table-input text-right" data-ans="540.00" placeholder="0.00"></td></tr>
                    <tr><td class="text-left">Omega & Co</td><td>820.00</td><td><input type="text" class="table-input text-right" data-ans="164.00" placeholder="0.00"></td><td><input type="text" class="table-input text-right" data-ans="984.00" placeholder="0.00"></td></tr>
                    <tr style="background:#F9FAFB; font-weight:700;"><td class="text-left">TOTALS</td><td>1,270.00</td><td><input type="text" class="table-input text-right" data-ans="254.00" placeholder="Total VAT"></td><td><input type="text" class="table-input text-right" data-ans="1,524.00" placeholder="Total Gross"></td></tr>
                </tbody>
            </table>
        `, explanation: "VAT is calculated at 20% on the net value: £450.00 * 0.20 = £90.00 (Total £540.00) and £820.00 * 0.20 = £164.00 (Total £984.00). Casting columns vertically gives: Total VAT = £254.00, Total Gross = £1,524.00."
    },
    {
        id: 3, chapter: 3, type: "input", points: 10,
        instruction: "Reconcile the Petty Cash Book under the Imprest System.",
        content: `
            <div style="margin-bottom:0.5rem;">A petty cash float is fixed at <strong>£250.00</strong>. During the month, the following expenditure vouchers were recorded:<br>• Stationery: £34.50 (inc. VAT)<br>• Window Cleaning: £20.00 (no VAT)<br>• Travel: £18.20 (no VAT)<br><br>Enter the cash top-up needed to restore the imprest float.</div>
            <div style="display:flex; align-items:center; max-width:180px; border:1px solid #E5E7EB; border-radius:6px; overflow:hidden;">
                <span style="padding:0.4rem 0.6rem; background:#E5E7EB; font-weight:bold; color:#4B5563;">£</span>
                <input type="text" class="table-input" id="q3_ans" data-ans="72.70" placeholder="0.00" style="border:none; width:100%;">
            </div>
        `,
        explanation: "Under the imprest system, the amount required to restore the float always equals the exact sum of the cash vouchers paid out: £34.50 + £20.00 + £18.20 = £72.70."
    },
    {
        id: 4, chapter: 4, type: "multi-input", points: 10,
        instruction: "Record correction of errors within the General Journal.",
        content: `
            <div style="margin-bottom:0.5rem;">A credit sale of £480.00 to J. Green was mistakenly posted to P. Green's ledger account. No error was made in Sales. Fill the journal grid to correct this error of commission.</div>
            <table class="financial-table">
                <thead><tr><th class="text-left">Account Name</th><th>Debit (£)</th><th>Credit (£)</th></tr></thead>
                <tbody>
                    <tr><td><input type="text" class="table-input" data-ans="J. Green" placeholder="Account Name" style="text-align:left;"></td><td><input type="text" class="table-input text-right" data-ans="480.00" placeholder="0.00"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td></tr>
                    <tr><td><input type="text" class="table-input" data-ans="P. Green" placeholder="Account Name" style="text-align:left;"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td><td><input type="text" class="table-input text-right" data-ans="480.00" placeholder="0.00"></td></tr>
                </tbody>
            </table>
        `,
        explanation: "This is an error of commission. To rectify it, we must debit the correct account (J. Green) to establish the asset and credit the incorrect account (P. Green) to cancel the original erroneous entry."
    },
    {
        id: 5, chapter: 5, type: "multi-input", points: 10,
        instruction: "Construct and balance the Trial Balance Matrix using DEAD CLIC.",
        content: `
            <div style="margin-bottom:0.5rem;">Allocate the ledger balances using the <strong>DEAD CLIC</strong> framework, then calculate the necessary Suspense Account balance required to reconcile the draft matrix.</div>
            <table class="financial-table">
                <thead><tr><th class="text-left">Account Details</th><th>Debit (£)</th><th>Credit (£)</th></tr></thead>
                <tbody>
                    <tr><td class="text-left">Sales Revenue Account</td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td><td><input type="text" class="table-input text-right" data-ans="12,500.00" placeholder="0.00"></td></tr>
                    <tr><td class="text-left">Purchases Account</td><td><input type="text" class="table-input text-right" data-ans="7,400.00" placeholder="0.00"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td></tr>
                    <tr><td class="text-left">Trade Receivables Control Account</td><td><input type="text" class="table-input text-right" data-ans="3,200.00" placeholder="0.00"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td></tr>
                    <tr style="background:#FFFBEB;"><td class="text-left" style="font-weight:700; color:#B45309;">Suspense Account Balance</td><td><input type="text" class="table-input text-right" data-ans="1,900.00" placeholder="0.00" style="font-weight:700;"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td></tr>
                </tbody>
            </table>
        `,
        explanation: "Sales is Income (Credit = £12,500.00). Purchases is Expense (Debit = £7,400.00). Receivables is Asset (Debit = £3,200.00). Total temporary Debits = £10,600.00 against Credits of £12,500.00. The Suspense Account requires a Debit balance of £1,900.00 to balance the matrix."
    },
    {
        id: 6, chapter: 2, type: "radio", points: 10,
        instruction: "Identify the correct entry for a Purchase Return transaction.",
        content: `
            <div style="margin-bottom:0.5rem;">When a business returns goods bought on credit to a supplier, which day book is used to record the transaction?</div>
            <div class="options-container">
                <label class="option-label"><input type="radio" name="q6" value="A"> Purchase Returns Day Book</label>
                <label class="option-label"><input type="radio" name="q6" value="B"> Sales Returns Day Book</label>
                <label class="option-label"><input type="radio" name="q6" value="C"> General Journal</label>
            </div>
        `, correct: "A",
        explanation: "Credit notes received from suppliers for returned goods are systematically entered into the Purchase Returns Day Book."
    },
    {
        id: 7, chapter: 3, type: "multi-input", points: 10,
        instruction: "Record Cash Book receipts and calculate bank balance.",
        content: `
            <div style="margin-bottom:0.5rem;">An opening bank balance is £1,200.00 (DR). The business receives a customer cheque of £350.00 and pays a supplier £400.00. Enter the closing balance.</div>
            <table class="financial-table">
                <thead><tr><th>Opening DR (£)</th><th>Receipts (£)</th><th>Payments (£)</th><th>Closing DR Balance (£)</th></tr></thead>
                <tbody>
                    <tr><td>1,200.00</td><td>350.00</td><td>400.00</td><td><input type="text" class="table-input text-right" data-ans="1,150.00" placeholder="0.00"></td></tr>
                </tbody>
            </table>
        `, explanation: "Closing debit balance calculation: £1,200 + £350 - £400 = £1,150.00."
    },
    {
        id: 8, chapter: 4, type: "radio", points: 10,
        instruction: "Classify errors that do not affect the Trial Balance agreement.",
        content: `
            <div style="margin-bottom:0.5rem;">A transaction is completely omitted from the accounting records. What type of error is this?</div>
            <div class="options-container">
                <label class="option-label"><input type="radio" name="q8" value="A"> Error of Omission</label>
                <label class="option-label"><input type="radio" name="q8" value="B"> Error of Commission</label>
                <label class="option-label"><input type="radio" name="q8" value="C"> Error of Principle</label>
            </div>
        `, correct: "A",
        explanation: "When a transaction is completely left out of the financial records, it is classified as an Error of Omission."
    },
    {
        id: 9, chapter: 4, type: "multi-input", points: 10,
        instruction: "Correct an error of principle in the General Journal.",
        content: `
            <div style="margin-bottom:0.5rem;">The purchase of a motor vehicle (£5,000) was incorrectly debited to the Motor Expenses account. Complete the journal entries to rectify this error of principle.</div>
            <table class="financial-table">
                <thead><tr><th class="text-left">Account Name</th><th>Debit (£)</th><th>Credit (£)</th></tr></thead>
                <tbody>
                    <tr><td><input type="text" class="table-input" data-ans="Motor Vehicles" placeholder="Account" style="text-align:left;"></td><td><input type="text" class="table-input text-right" data-ans="5,000.00" placeholder="0.00"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td></tr>
                    <tr><td><input type="text" class="table-input" data-ans="Motor Expenses" placeholder="Account" style="text-align:left;"></td><td><input type="text" class="table-input text-right" data-ans="" placeholder="-"></td><td><input type="text" class="table-input text-right" data-ans="5,000.00" placeholder="0.00"></td></tr>
                </tbody>
            </table>
        `, explanation: "Debit Motor Vehicles to open the asset account, and credit Motor Expenses to remove the wrong expense entry."
    },
    {
        id: 10, chapter: 5, type: "radio", points: 10,
        instruction: "Understand the purpose of the Trade Payables Control Account (TPCA).",
        content: `
            <div style="margin-bottom:0.5rem;">Which of the following describes the main purpose of the Trade Payables Control Account?</div>
            <div class="options-container">
                <label class="option-label"><input type="radio" name="q10" value="A"> To check the arithmetic accuracy of the Purchase Ledger.</label>
                <label class="option-label"><input type="radio" name="q10" value="B"> To record credit sales made to financial customers.</label>
                <label class="option-label"><input type="radio" name="q10" value="C"> To calculate the value of cash inventory held.</label>
            </div>
        `, correct: "A",
        explanation: "The control account acts as a summary check to verify the overall mathematical correctness of individual accounts within the Purchase Ledger."
    }
];

let examQuestions = []; 
let currentTabActive = 0;
let timeRemainingSeconds = 3600;
let examTimerInterval = null;
let isExamSubmitted = false;

window.addEventListener('DOMContentLoaded', () => { initExamEngine(); });
function initExamEngine() {
    examQuestions = [...questionsDatabase].sort(() => Math.random() - 0.5);
    generateTabs();
    generatePanels();
    activateTab(0);
    startExamTimer();
}

function generateTabs() {
    const container = document.getElementById('exam-tabs-headers');
    if (!container) return;
    container.innerHTML = '';
    examQuestions.forEach((q, index) => {
        container.innerHTML += `<button type="button" class="tab-trigger-btn" id="tab-trigger-${index}" onclick="activateTab(${index})">Task ${index + 1} <span style="font-size:0.7rem; background:#E5E7EB; padding:1px 3px; border-radius:2px;">${q.points}pt</span></button>`;
    });
}

function generatePanels() {
    const container = document.getElementById('exam-panels-container');
    if (!container) return;
    container.innerHTML = '';
    
    examQuestions.forEach((q, index) => {
        const panel = document.createElement('div');
        panel.className = 'exam-task-panel';
        panel.id = `task-panel-${index}`;
        
        panel.innerHTML = `
            <div style="font-size:0.75rem; color:#6B7280; font-weight:600; margin-bottom:0.25rem; text-transform: uppercase;">CHAPTER ${q.chapter} Focus</div>
            <div style="font-weight:600; margin-bottom:0.75rem; color:#111827;">${q.instruction}</div>
            <div class="task-interactive-body">${q.content}</div>
            
            <div class="feedback-box hidden" id="feedback-panel-${index}" style="display: none; margin-top: 1rem; padding: 1rem; border-radius: 6px;">
                <div id="feedback-title-${index}" style="font-weight:700; margin-bottom:0.5rem;"></div>
                <div style="font-size:0.85rem; color:#4B5563; padding-top:0.5rem; border-top:1px dashed rgba(0,0,0,0.15);">
                    <strong>Solution Note:</strong> ${q.explanation}
                </div>
            </div>
        `;
        container.appendChild(panel);
    });
}

function activateTab(index) {
    if (index < 0 || index >= examQuestions.length) return;
    document.querySelectorAll('.tab-trigger-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.exam-task-panel').forEach(p => {
        p.classList.remove('active');
        p.style.display = 'none';
    });
    
    document.getElementById(`tab-trigger-${index}`).classList.add('active');
    const activePanel = document.getElementById(`task-panel-${index}`);
    activePanel.classList.add('active');
    activePanel.style.display = 'block';
    
    currentTabActive = index;
    document.getElementById('btn-prev').disabled = (index === 0);
    document.getElementById('btn-next').disabled = (index === examQuestions.length - 1);
}

function navPrev() { if (currentTabActive > 0) activateTab(currentTabActive - 1); }
function navNext() { if (currentTabActive < examQuestions.length - 1) activateTab(currentTabActive + 1); }

function submitExam() {
    if (isExamSubmitted) return;
    clearInterval(examTimerInterval);
    isExamSubmitted = true;
    let available = 0, awarded = 0;

    examQuestions.forEach((q, index) => {
        const panel = document.getElementById(`task-panel-${index}`);
        const feedbackBox = document.getElementById(`feedback-panel-${index}`);
        const feedbackTitle = document.getElementById(`feedback-title-${index}`);
        available += q.points;
        let isCorrect = true;

        if (q.type === "radio") {
            const sel = panel.querySelector(`input[name="q${q.id}"]:checked`);
            isCorrect = (sel && sel.value === q.correct);
        } else {
            panel.querySelectorAll('input[data-ans]').forEach(i => {
                if (i.value.trim().toLowerCase() !== i.getAttribute('data-ans').trim().toLowerCase()) {
                    isCorrect = false;
                    i.style.borderColor = "#DC2626";
                } else {
                    i.style.borderColor = "#059669";
                }
                i.disabled = true;
            });
        }

        feedbackBox.style.display = 'block';
        feedbackBox.classList.remove('hidden');
        
        if (isCorrect) {
            awarded += q.points;
            feedbackBox.style.backgroundColor = "#DEF7EC";
            feedbackBox.style.borderLeft = "4px solid #059669";
            feedbackTitle.innerHTML = `✅ Correct! (+${q.points} Pts)`;
            feedbackTitle.style.color = "#065F46";
        } else {
            feedbackBox.style.backgroundColor = "#FDE8E8";
            feedbackBox.style.borderLeft = "4px solid #DC2626";
            feedbackTitle.innerHTML = `❌ Incorrect! (0 / ${q.points} Pts)`;
            feedbackTitle.style.color = "#9B1C1C";
        }
    });

    const score = available > 0 ? Math.round((awarded / available) * 100) : 0;
    document.getElementById('res-score').textContent = `${score}%`;
    document.getElementById('res-points').textContent = `${awarded} / ${available}`;
    
    const outcomeField = document.getElementById('res-outcome');
    if (score >= 70) {
        outcomeField.textContent = "PASS (Competent)";
        outcomeField.style.color = "#059669";
    } else {
        outcomeField.textContent = "FAIL (Not Yet Competent)";
        outcomeField.style.color = "#DC2626";
    }

    document.querySelectorAll('.feedback-box').forEach(fb => {
        fb.style.display = 'block';
        fb.classList.remove('hidden');
    });

    document.getElementById('results-card').classList.remove('hidden');
    alert(`Assessment submitted! Your score is ${score}%`);
}

function resetExam() {
    if (confirm("Reset current exam session? All inputs will be wiped.")) {
        clearInterval(examTimerInterval);
        isExamSubmitted = false;
        timeRemainingSeconds = 3600;
        document.getElementById('exam-timer').style.color = "#FFFFFF";
        document.getElementById('results-card').classList.add('hidden');
        initExamEngine();
    }
}

function startExamTimer() {
    const display = document.getElementById('exam-timer');
    examTimerInterval = setInterval(() => {
        if (timeRemainingSeconds <= 0) {
            clearInterval(examTimerInterval);
            submitExam();
        } else {
            timeRemainingSeconds--;
            let min = Math.floor(timeRemainingSeconds / 60), sec = timeRemainingSeconds % 60;
            display.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            if (timeRemainingSeconds < 300) display.style.color = "#DC2626";
        }
    }, 1000);
}

function toggleCalc() {
    const c = document.getElementById('neon-calc');
    c.style.display = (c.style.display === 'block') ? 'none' : 'block';
}
function pressNum(n) {
    const d = document.getElementById('calc-display');
    d.value = (d.value === '0') ? n : d.value + n;
}
function pressOp(o) { document.getElementById('calc-display').value += o; }
function clearCalc() { document.getElementById('calc-display').value = '0'; }
function calcResult() {
    const d = document.getElementById('calc-display');
    try { d.value = eval(d.value); } catch(e) { d.value = 'Error'; }
}
</script>
</body>
